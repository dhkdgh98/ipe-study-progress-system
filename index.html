<style>
:root{--bg:#091220;--bg2:#0b1526;--panel:#111f36;--panel2:#162842;--line:rgba(212,230,255,.15);--text:#eef6ff;--muted:#9fb1cf;--soft:#c9d8ed;--cyan:#78dcff;--violet:#b7a6ff;--green:#82efb4;--yellow:#ffd27e;--red:#ff9ab7;--shadow:0 18px 55px rgba(0,0,0,.31);--r:16px}

px;font-size:.68rem;color:#d8e6f8;line-height:1}.chip.rankA{border-color:rgba(255,209,123,.4);color:#ffebba}.chip.rankB{border-color:rgba(120,220,255,.4);color:#d9f7ff}.chip.rankC{border-color:rgba(183,166,255,.4);color:#eee7ff}.chip.rankD{border-color:rgba(159,177,207,.4);color:#d2ddec}.chip.stage{border-color:rgba(131,239,180,.36);color:#ccffe0}.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.toolbar input{min-width:190px;flex:1}.toolbar select{width:auto;min-width:125px}.spacer{flex:1}.list{display:grid;gap:8px}.item{border:1px solid var(--line);background:rgba(255,255,255,.022);border-radius:12px;padding:11px}.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:9px}.item-name{font-size:.89rem;font-weight:880;line-height:1.35}.item-sub{font-size:.73rem;color:var(--muted);line-height:1.48;margin-top:4px}.item-actions{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}.lane-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.lane{border:1px solid var(--line);background:rgba(255,255,255,.018);border-radius:13px;padding:11px}.lane-title{display:flex;justify-content:space-between;align-items:center;gap:7px;font-weight:900;font-size:.86rem;margin-bottom:7px}.lane-title small{color:var(--muted);font-weight:600}.review{border-left:3px solid var(--yellow)}.review.overdue{border-left-color:var(--red)}.empty{padding:34px 14px;color:var(--muted);text-align:center;border:1px dashed rgba(120,220,255,.23);border-radius:12px}.forecast{border-top:3px solid var(--green)}.forecast-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.bar-chart{display:grid;grid-template-columns:repeat(14,minmax(0,1fr));gap:7px;align-items:end;height:170px;padding:12px 3px 0}.bar-col{height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;min-width:0}.bar{width:100%;max-width:22px;min-height:3px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(- m;font-weight:800;margin:0 0 6px}.modal-foot{display:flex;gap:8px;align-items:center;padding:11px;border-top:1px solid var(--line)}.grow{flex:1}.toast{position:fixed;right:17px;bottom:17px;z-index:90;display:flex;align-items:center;gap:9px;max-width:min(420px,calc(100vw - 34px));padding:10px 11px;border:1px solid rgba(120,220,255,.4);border-radius:12px;background:#15314e;box-shadow:var(--shadow);font-size:.79rem}.footer{max-width:1440px;margin:0 auto;padding:0 18px 20px;color:#7385a4;font-size:.72rem;line-height:1.5}

.cloud-status{font-size:.74rem;color:var(--muted);line-height:1.5;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.025);padding:10px;margin-top:12px}

const STAGES={A:[['D+1',1],['D+3',3],['D+7',7],['D+14',14],['D+21',21]],B:[['D+1',1],['D+7',7],['D+21',21]],C:[['D+3',3],['D+14',14]],D:[['D+7',7]]};
const PRIORITY={'D+1':1,'D+3':2,'D+7':3,'D+14':4,'D+21':5};
const $=s=>document.querySelector(s);
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const clone=v=>JSON.parse(JSON.stringify(v));
function isoToday(){const d=new Date();const off=d.getTimezoneOffset()*60000;return new Date(d-off).toISOString().slice(0,10)}
function dateObj(v){return new Date(String(v)+'T12:00:00')}
function keyOf(d){return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function addDays(v,n){const d=dateObj(v);d.setDate(d.getDate()+n);return keyOf(d)}
function diffDays(a,b){return Math.round((dateObj(a)-dateObj(b))/86400000)}
function maxDate(a,b){return a>b?a:b}function minDate(a,b){return a<b?a:b}
function mondayOf(v){const d=dateObj(v),w=d.getDay()||7;d.setDate(d.getDate()-w+1);return keyOf(d)}
function sundayOf(v){return addDays(mondayOf(v),6)}
function fmtDate(v){if(!v)return '—';const [y,m,d]=String(v).split('-').map(Number);return `${m}/${d}`}
function pct(n,d){return d?Math.round(n/d*100):0}
function roundA(n){return Math.round(n*100)/100}
function parseStorage(key){try{return JSON.parse(localStorage.getItem(key))}catch{return null}}
function defaultState(){return {version:4,activeTab:'dashboard',previousTab:'today',activeDate:isoToday(),studyItemId:'',progress:{},notes:{},settings:{startDate:'2026-07-07',w125:3,w34:3,e125:6,e34:6,examDate:'2026-08-07'},itemFilters:{q:'',track:'all',rank:'all',subject:'all',section:'all'}}}
function mergeState(base,add){const out=clone(base);if(!add||typeof add!=='object')return out;Object.keys(add).forEach(k=>{if(add[k]&&typeof add[k]==='object'&&!Array.isArray(add[k])&&out[k]&&typeof out[k]==='object'&&!Array.isArray(out[k]))out[k]=mergeState(out[k],add[k]);else out[k]=add[k]});return out}
function migrate(){
  const fresh=defaultState(), saved=parseStorage(APP_KEY);
  if(saved)return mergeState(fresh,saved);
  const legacy=parseStorage(LEGACY_PROGRESS_KEY);
  if(!legacy)return fresh;
  const migrated=mergeState(fresh,{activeDate:legacy.activeDate||fresh.activeDate,progress:legacy.progress||{},notes:legacy.notes||{},settings:{...fresh.settings,...(legacy.settings||{})},itemFilters:legacy.filters||fresh.itemFilters});
  migrated.activeTab='dashboard';return migrated;
}
let state=migrate();
const ITEM_BY_ID=new Map(ITEMS.map(i=>[String(i.id),i]));
const BRIDGE_CATALOG=ITEMS.map(i=>({id:i.id,subjectNo:i.subjectNo,subject:i.subject,section:i.section,name:i.name,rank:i.rank,typeCode:i.typeCode}));
const BRIDGE_CATALOG_SIG=BRIDGE_CATALOG.map(i=>`${i.id}|${i.subjectNo}|${i.subject}|${i.section}|${i.name}|${i.rank}|${i.typeCode}`).join('¶');
let bridgeCache=null;
let lastAppSerialized=localStorage.getItem(APP_KEY);

function persistAppLocal(message='자동 저장'){
 const serialized=JSON.stringify(state);
 if(serialized!==lastAppSerialized){
  localStorage.setItem(APP_KEY,serialized);
  lastAppSerialized=serialized;
 }
 const chip=$('#saveChip');if(chip)chip.textContent=message+' · 이 브라우저';
}
function save(message='자동 저장'){persistAppLocal(message)}
function saveUI(message='화면 상태 저장'){persistAppLocal(message)}

function bridgeCatalogSig(catalog){
 if(!Array.isArray(catalog))return '';
 return catalog.map(i=>`${i?.id??''}|${i?.subjectNo??''}|${i?.subject??''}|${i?.section??''}|${i?.name??''}|${i?.rank??''}|${i?.typeCode??''}`).join('¶');
}
function ensureBridge(forceReload=false){
 if(bridgeCache&&!forceReload)return bridgeCache;
 const raw=parseStorage(BRIDGE_KEY)||{};
 let dirty=false;
 if(!Array.isArray(raw.links)){raw.links=[];dirty=true}
 if(bridgeCatalogSig(raw.catalog)!==BRIDGE_CATALOG_SIG){raw.catalog=BRIDGE_CATALOG;dirty=true}
 bridgeCache=raw;
 if(dirty)localStorage.setItem(BRIDGE_KEY,JSON.stringify(raw));
 return raw;
}
function invalidateBridgeCache(){bridgeCache=null}
function bridge(){return ensureBridge()}
function itemById(id){return ITEM_BY_ID.get(String(id))}
function pOf(id){return state.progress[id]||null}
function ensureP(id){return state.progress[id]??={d0:null,reviews:{}}}
function completedBy(item,date=state.activeDate){const p=pOf(item.id);return !!(p?.d0&&p.d0<=date)}
function completedItems(date=state.activeDate){return ITEMS.filter(i=>completedBy(i,date))}
function trackTarget(track,date){
  const day=dateObj(date).getDay(),weekend=day===0||day===6,s=state.settings;
  return Number(track==='1·2·5'?(weekend?s.e125:s.w125):(weekend?s.e34:s.w34))||0;
}
function dailyGoal(date){if(date<state.settings.startDate)return 0;return trackTarget('1·2·5',date)+trackTarget('3·4',date)}
function d0Units(date,track='all'){return ITEMS.filter(i=>pOf(i.id)?.d0===date&&(track==='all'||i.track===track)).reduce((sum,i)=>sum+Number(i.unit||0),0)}
function d0UnitsRange(start,end,dateLimit=state.activeDate){return ITEMS.filter(i=>{const d=pOf(i.id)?.d0;return d&&d>=start&&d<=end&&d<=dateLimit}).reduce((sum,i)=>sum+Number(i.unit||0),0)}
function goalRange(start,end){let total=0,cur=maxDate(start,state.settings.startDate);while(cur<=end){total+=dailyGoal(cur);cur=addDays(cur,1)}return roundA(total)}
function stageList(item){const p=pOf(item.id);if(!p?.d0)return [];return STAGES[item.rank].map(([stage,offset])=>({stage,offset,due:addDays(p.d0,offset),done:!!p.reviews?.[stage],doneDate:p.reviews?.[stage]||null}))}
function dueReviews(date=state.activeDate){const arr=[];ITEMS.forEach(item=>stageList(item).forEach(r=>{if(!r.done&&r.due<=date)arr.push({item,...r,overdue:r.due<date})}));return arr.sort((a,b)=>Number(b.overdue)-Number(a.overdue)||PRIORITY[a.stage]-PRIORITY[b.stage]||a.due.localeCompare(b.due)||a.item.id.localeCompare(b.item.id))}
function reviewDoneCount(){return ITEMS.reduce((s,i)=>s+stageList(i).filter(r=>r.done).length,0)}
function reviewTotalCount(){return ITEMS.reduce((s,i)=>s+STAGES[i.rank].length,0)}
function weekStats(date=state.activeDate){
  const start=maxDate(mondayOf(date),state.settings.startDate),end=sundayOf(date),paceEnd=minDate(date,end);
  return {start,end,done:d0UnitsRange(start,end,date),goal:goalRange(start,end),paceGoal:goalRange(start,paceEnd)};
}
function fourWeekStats(date=state.activeDate){
  const anchor=mondayOf(state.settings.startDate);
  const idx=Math.max(0,Math.floor(diffDays(date,anchor)/28));
  const rawStart=addDays(anchor,idx*28),start=maxDate(rawStart,state.settings.startDate),end=addDays(rawStart,27),paceEnd=minDate(date,end);
  return {start,end,done:d0UnitsRange(start,end,date),goal:goalRange(start,end),paceGoal:goalRange(start,paceEnd)};
}
function todayStats(date=state.activeDate){return {done:d0Units(date),goal:dailyGoal(date)}}
function forecastTrack(track){
  const pending=ITEMS.filter(i=>i.track===track&&!pOf(i.id)?.d0);
  let day=state.activeDate,cap=Math.max(0,trackTarget(track,day)-d0Units(day,track)),idx=0,guard=0;
  while(idx<pending.length&&guard<1600){
    const unit=Number(pending[idx].unit||0);
    if(cap+0.0001>=unit){cap-=unit;idx++}else{day=addDays(day,1);cap=trackTarget(track,day)}
    guard++;
  }
  return {track,finish:day,remaining:roundA(pending.reduce((s,i)=>s+Number(i.unit||0),0)),items:pending.length};
}
function actualForecast(){
  const done=completedItems().sort((a,b)=>pOf(a.id).d0.localeCompare(pOf(b.id).d0));
  if(!done.length)return null;
  const first=pOf(done[0].id).d0,days=Math.max(1,diffDays(state.activeDate,first)+1),doneA=done.reduce((s,i)=>s+Number(i.unit||0),0),total=ITEMS.reduce((s,i)=>s+Number(i.unit||0),0),rate=doneA/days,remaining=Math.max(0,total-doneA);
  return {first,days,rate,finish:remaining<=0?state.activeDate:addDays(state.activeDate,Math.max(0,Math.ceil(remaining/Math.max(rate,.01))-1))};
}
function atlasCoverage(){
  const b=bridge(),linkedItems=new Set(b.links.map(x=>String(x.itemId))),linkedConcepts=new Set(b.links.map(x=>x.conceptId));
  return {items:linkedItems.size,concepts:linkedConcepts.size,totalLinks:b.links.length,unlinked:ITEMS.filter(i=>!linkedItems.has(String(i.id)))};
}
function rankChip(rank){return `<span class="chip rank${rank}">${rank}랭크</span>`}
function itemStatus(item){const p=pOf(item.id);if(!p?.d0)return `<span class="chip">미시작</span>`;const next=stageList(item).find(r=>!r.done);return `<span class="chip stage">${next?`진행 · ${next.stage}`:'S4 마스터'}</span>`}
function itemCard(item,extra=''){

}
function metric(label,done,goal,detail=''){
  const per=pct(done,goal);

}

}

/* v13 JS: Supabase no-login encrypted sync UI */
const ATLAS_STORAGE='concept-atlas-v3-feed';
const CLOUD_SQL = "-- Learning OS: 로그인 없는 암호화 동기화용 Supabase SQL\n-- Supabase Dashboard → SQL Editor에서 한 번만 실행\n\ncreate table if not exists public.learning_os_snapshots (\n  sync_id text primary key,\n  write_hash text not null,\n  encrypted_state text not null,\n  salt text not null,\n  iv text not null,\n  updated_at timestamptz not null default now(),\n  app_version text not null default 'v13'\n);\n\nalter table public.learning_os_snapshots enable row level security;\n\n-- 테이블 직접 접근은 막고, 아래 RPC 함수만 anon으로 호출한다.\nrevoke all on public.learning_os_snapshots from anon, authenticated;\n\ncreate or replace function public.load_learning_os_snapshot(p_sync_id text)\nreturns table (\n  encrypted_state text,\n  salt text,\n  iv text,\n  updated_at timestamptz\n)\nlanguage sql\nsecurity definer\nset search_path = public\nas $$\n  select encrypted_state, salt, iv, updated_at\n  from public.learning_os_snapshots\n  where sync_id = p_sync_id\n  limit 1;\n$$;\n\ncreate or replace function public.save_learning_os_snapshot(\n  p_sync_id text,\n  p_write_hash text,\n  p_encrypted_state text,\n  p_salt text,\n  p_iv text\n)\nreturns table (updated_at timestamptz)\nlanguage plpgsql\nsecurity definer\nset search_path = public\nas $$\nbegin\n  if exists (\n    select 1\n    from public.learning_os_snapshots\n    where sync_id = p_sync_id\n      and write_hash <> p_write_hash\n  ) then\n    raise exception 'invalid sync key';\n  end if;\n\n  insert into public.learning_os_snapshots\n    (sync_id, write_hash, encrypted_state, salt, iv, updated_at, app_version)\n  values\n    (p_sync_id, p_write_hash, p_encrypted_state, p_salt, p_iv, now(), 'v13')\n  on conflict (sync_id) do update\n    set encrypted_state = excluded.encrypted_state,\n        salt = excluded.salt,\n        iv = excluded.iv,\n        updated_at = now(),\n        app_version = 'v13'\n    where public.learning_os_snapshots.write_hash = excluded.write_hash;\n\n  return query\n  select s.updated_at\n  from public.learning_os_snapshots s\n  where s.sync_id = p_sync_id;\nend;\n$$;\n\ngrant execute on function public.load_learning_os_snapshot(text) to anon;\ngrant execute on function public.save_learning_os_snapshot(text,text,text,text,text) to anon;";

function cloudCfg(){

}

function cloudReadInputs(){

function cloudSetStatus(msg,remoteAt=''){
  const c=cloudCfg();
  c.lastStatus=msg;
  if(remoteAt)c.lastRemoteAt=remoteAt;
  localStorage.setItem(APP_KEY,JSON.stringify(state));

function cloudNeedConfig(){
  const c=cloudCfg();
  if(!c.url||!c.anonKey||!c.syncKey){
    showToast('Supabase URL, anon key, 동기화 키를 먼저 저장해야 해.');
    return null;
  }
  return c;
}
const encV13=new TextEncoder(), decV13=new TextDecoder();
function bytesToB64(bytes){let bin='';bytes.forEach(b=>bin+=String.fromCharCode(b));return btoa(bin)}
function b64ToBytes(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function sha256hex(text){
  const buf=await crypto.subtle.digest('SHA-256',encV13.encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function deriveAes(secret,salt){
  const base=await crypto.subtle.importKey('raw',encV13.encode(secret),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function cloudIds(secret){
  return {
    sync_id:await sha256hex('ipe-learning-os:id:'+secret),
    write_hash:await sha256hex('ipe-learning-os:write:'+secret)
  };
}
async function encryptSnapshot(obj,secret){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveAes(secret,salt);
  const cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,encV13.encode(JSON.stringify(obj)));
  return {encrypted_state:bytesToB64(new Uint8Array(cipher)),salt:bytesToB64(salt),iv:bytesToB64(iv)};
}
async function decryptSnapshot(row,secret){
  const salt=b64ToBytes(row.salt),iv=b64ToBytes(row.iv);
  const key=await deriveAes(secret,salt);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,b64ToBytes(row.encrypted_state));
  return JSON.parse(decV13.decode(plain));
}
function snapshotPayload(){
  return {
    version:13,
    exportedAt:new Date().toISOString(),
    app:state,
    bridge:bridge(),
    atlas:parseStorage(ATLAS_STORAGE)
  };
}
function applySnapshotPayload(data){
  if(!data||typeof data!=='object')throw new Error('invalid snapshot');
  if(data.app)state=mergeState(defaultState(),data.app);
  else state=mergeState(defaultState(),data);
  if(data.bridge)localStorage.setItem(BRIDGE_KEY,JSON.stringify(data.bridge));
  if(data.atlas)localStorage.setItem(ATLAS_STORAGE,JSON.stringify(data.atlas));
  cloudSuppressAuto=true;
  save('원격 데이터 적용');
  cloudSuppressAuto=false;
  render();
}
async function cloudRpc(fn,body){
  const c=cloudNeedConfig(); if(!c)throw new Error('missing config');
  const res=await fetch(`${c.url}/rest/v1/rpc/${fn}`,{
    method:'POST',
    headers:{
      'apikey':c.anonKey,
      'Authorization':`Bearer ${c.anonKey}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify(body)
  });
  const text=await res.text();
  let json=null; try{json=text?JSON.parse(text):null}catch{json=text}
  if(!res.ok)throw new Error(typeof json==='string'?json:(json?.message||`HTTP ${res.status}`));
  return json;
}
async function cloudUploadNow(){
  const c=cloudNeedConfig(); if(!c)return;
  cloudSetStatus('원격 저장 중...');
  const ids=await cloudIds(c.syncKey);
  const encrypted=await encryptSnapshot(snapshotPayload(),c.syncKey);
  const result=await cloudRpc('save_learning_os_snapshot',{
    p_sync_id:ids.sync_id,
    p_write_hash:ids.write_hash,
    p_encrypted_state:encrypted.encrypted_state,
    p_salt:encrypted.salt,
    p_iv:encrypted.iv
  });
  const at=Array.isArray(result)&&result[0]?.updated_at?result[0].updated_at:new Date().toISOString();
  cloudSetStatus('원격 저장 완료',at);
  showToast('Supabase에 암호화 백업을 저장했어.');
}
async function cloudDownloadNow(){
  const c=cloudNeedConfig(); if(!c)return;
  cloudSetStatus('원격 불러오는 중...');
  const ids=await cloudIds(c.syncKey);
  const result=await cloudRpc('load_learning_os_snapshot',{p_sync_id:ids.sync_id});
  const row=Array.isArray(result)?result[0]:null;
  if(!row){cloudSetStatus('원격 데이터 없음');showToast('이 동기화 키로 저장된 원격 데이터가 없어.');return;}
  const payload=await decryptSnapshot(row,c.syncKey);
  applySnapshotPayload(payload);
  cloudSetStatus('원격 불러오기 완료',row.updated_at||new Date().toISOString());
  showToast('Supabase 원격 데이터를 이 브라우저에 적용했어.');
}
let cloudTimer=null, cloudSuppressAuto=false;
const v13BaseSave=save;
save=function(message='자동 저장'){
  v13BaseSave(message);
  if(!cloudSuppressAuto&&cloudCfg().auto&&cloudCfg().url&&cloudCfg().anonKey&&cloudCfg().syncKey){
    clearTimeout(cloudTimer);
    cloudTimer=setTimeout(()=>cloudUploadNow().catch(err=>cloudSetStatus('자동 원격 저장 실패: '+err.message)),2600);
  }
};

exportData=function(){
  const payload=snapshotPayload();
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`정처기_LearningOS_통합백업_v13_${state.activeDate}.json`;a.click();URL.revokeObjectURL(a.href);showToast('Atlas까지 포함한 통합 백업을 내보냈어.');
};
importData=function(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      applySnapshotPayload(data);
      showToast('통합 백업을 불러왔어.');
    }catch(err){showToast('백업 형식을 읽지 못했어: '+err.message)}
  };
  reader.readAsText(file);
};

document.addEventListener('click',async e=>{
  const b=e.target.closest('[data-cloud-action]'); if(!b)return;
  e.preventDefault();
  const a=b.dataset.cloudAction;
  try{
    if(a==='save-config'){
      cloudReadInputs();
      cloudSuppressAuto=true;
      save('Supabase 연결 정보 저장');
      cloudSuppressAuto=false;
      render();
      showToast('Supabase 연결 정보를 이 브라우저에 저장했어.');
    }else if(a==='gen-key'){
      const bytes=crypto.getRandomValues(new Uint8Array(18));
      const key='los-'+bytesToB64(bytes).replaceAll('+','-').replaceAll('/','_').replaceAll('=','');
      const input=$('#sbSyncKey'); if(input)input.value=key;
      showToast('동기화 키를 생성했어. 연결 정보 저장을 눌러줘.');
    }else if(a==='copy-sql'){
      await navigator.clipboard.writeText(CLOUD_SQL);
      showToast('Supabase SQL을 복사했어.');
    }else if(a==='upload'){
      cloudReadInputs(); await cloudUploadNow();
    }else if(a==='download'){
      cloudReadInputs();
      openConfirm('원격 데이터를 불러올까?','현재 브라우저의 데이터가 원격 데이터로 덮어써져. 불안하면 먼저 통합 백업을 내보내.', '원격 불러오기', async()=>{closeModal();try{await cloudDownloadNow()}catch(err){cloudSetStatus('원격 불러오기 실패: '+err.message);showToast('원격 불러오기 실패: '+err.message)}})
    }else if(a==='clear-config'){
      state.settings.supabaseSync=cloudDefaults();
      cloudSuppressAuto=true; save('Supabase 연결 정보 삭제'); cloudSuppressAuto=false;
      render(); showToast('Supabase 연결 정보를 삭제했어.');
    }
  }catch(err){
    cloudSetStatus('Supabase 오류: '+err.message);
    showToast('Supabase 오류: '+err.message);
  }
},true);

/* v15: Direct Table REST sync - avoids RPC schema cache mismatch */
const CLOUD_SQL_V15 = '-- Learning OS v15: 로그인 없는 Direct Table 암호화 동기화용 Supabase SQL\n-- Supabase Dashboard → SQL Editor에서 한 번만 실행\n-- 기존 RPC 방식 대신 REST table upsert/select를 사용하므로 schema cache 함수 문제를 피한다.\n\ncreate table if not exists public.learning_os_snapshots (\n  sync_id text primary key,\n  write_hash text not null,\n  encrypted_state text not null,\n  salt text not null,\n  iv text not null,\n  updated_at timestamptz not null default now(),\n  app_version text not null default \'v15\'\n);\n\nalter table public.learning_os_snapshots enable row level security;\n\ngrant select, insert, update on public.learning_os_snapshots to anon;\n\ndrop policy if exists "learning_os_anon_select_encrypted" on public.learning_os_snapshots;\ndrop policy if exists "learning_os_anon_insert_encrypted" on public.learning_os_snapshots;\ndrop policy if exists "learning_os_anon_update_encrypted" on public.learning_os_snapshots;\n\n-- 로그인 없는 개인용 암호화 저장소 정책.\n-- 데이터 본문은 브라우저에서 AES-GCM으로 암호화되어 저장된다.\n-- sync_id는 동기화 키의 SHA-256 파생값이라 사실상 개인 저장소 주소 역할을 한다.\ncreate policy "learning_os_anon_select_encrypted"\non public.learning_os_snapshots\nfor select\nto anon\nusing (true);\n\ncreate policy "learning_os_anon_insert_encrypted"\non public.learning_os_snapshots\nfor insert\nto anon\nwith check (true);\n\ncreate policy "learning_os_anon_update_encrypted"\non public.learning_os_snapshots\nfor update\nto anon\nusing (true)\nwith check (true);\n\nnotify pgrst, \'reload schema\';\n';

      <div class="setting"><label>자동 원격 저장</label><select id="sbAuto"><option value="false" ${!c.auto?'selected':''}>OFF · 수동 저장</option><option value="true" ${c.auto?'selected':''}>ON · 로컬 저장 후 자동 업로드</option></select></div>
      <div class="setting"><label>접속 시 원격 불러오기</label><select id="sbAutoPull"><option value="false" ${!c.autoPull?'selected':''}>OFF · 수동 불러오기</option><option value="true" ${c.autoPull?'selected':''}>ON · 앱 열 때 원격 적용</option></select></div>
      <div class="setting"><label>저장 후 검증</label><select id="sbVerify"><option value="true" ${c.verifyAfterUpload!==false?'selected':''}>ON · 저장 직후 원격 재조회</option><option value="false" ${c.verifyAfterUpload===false?'selected':''}>OFF</option></select></div>

    <pre class="cloud-sql" id="cloudSql">${cloudEsc(CLOUD_SQL_V15)}</pre>

async function cloudDirectGetRow(sync_id){
  const c=cloudNeedConfig(); if(!c)return null;
  const url=`${c.url}/rest/v1/learning_os_snapshots?sync_id=eq.${encodeURIComponent(sync_id)}&select=encrypted_state,salt,iv,updated_at,app_version`;
  const res=await fetch(url,{headers:{'apikey':c.anonKey,'Authorization':`Bearer ${c.anonKey}`,'Accept':'application/json'}});
  const text=await res.text(); let json=null; try{json=text?JSON.parse(text):null}catch{json=text}
  if(!res.ok)throw new Error(typeof json==='string'?json:(json?.message||`HTTP ${res.status}`));
  return Array.isArray(json)?json[0]:null;
}
async function cloudFetchRemoteRow(){
  const c=cloudNeedConfig(); if(!c)return null;
  const ids=await cloudIds(c.syncKey);
  return cloudDirectGetRow(ids.sync_id);
}
cloudUploadNow=async function(){
  const c=cloudNeedConfig(); if(!c)return;
  const payload=snapshotPayload();
  c.lastUploadBytes=v14SnapshotSize? v14SnapshotSize(payload) : JSON.stringify(payload).length;
  cloudSetStatus('원격 저장 중 · Direct Table...');
  const ids=await cloudIds(c.syncKey);
  const encrypted=await encryptSnapshot(payload,c.syncKey);
  const row={sync_id:ids.sync_id,write_hash:ids.write_hash,encrypted_state:encrypted.encrypted_state,salt:encrypted.salt,iv:encrypted.iv,updated_at:new Date().toISOString(),app_version:'v15'};
  const res=await fetch(`${c.url}/rest/v1/learning_os_snapshots?on_conflict=sync_id`,{
    method:'POST',
    headers:{
      'apikey':c.anonKey,
      'Authorization':`Bearer ${c.anonKey}`,
      'Content-Type':'application/json',
      'Prefer':'resolution=merge-duplicates,return=representation'
    },
    body:JSON.stringify(row)
  });
  const text=await res.text(); let json=null; try{json=text?JSON.parse(text):null}catch{json=text}
  if(!res.ok)throw new Error(typeof json==='string'?json:(json?.message||`HTTP ${res.status}`));
  const saved=Array.isArray(json)?json[0]:null;
  const at=saved?.updated_at||row.updated_at;
  cloudSetStatus('원격 저장 완료 · Direct Table',at);
  if(c.verifyAfterUpload!==false){
    const remote=await cloudDirectGetRow(ids.sync_id);
    if(!remote)throw new Error('저장 직후에도 해당 sync_id 행을 찾지 못함. v15 SQL/RLS 정책을 확인해야 함.');
    await decryptSnapshot(remote,c.syncKey);
    c.lastVerifiedAt=new Date().toISOString();
    cloudSetStatus('원격 저장 완료 · 재조회/복호화 검증 완료',remote.updated_at||at);
  }
  showToast('Supabase 원격 저장/검증 완료.');
};
cloudDownloadNow=async function(){
  const c=cloudNeedConfig(); if(!c)return;
  cloudSetStatus('원격 불러오는 중 · Direct Table...');
  const ids=await cloudIds(c.syncKey);
  const row=await cloudDirectGetRow(ids.sync_id);
  if(!row){
    cloudSetStatus('원격 데이터 없음 · 같은 동기화 키로 먼저 원격 저장해야 함');
    showToast('저장된 데이터가 없어. 같은 동기화 키인지, v15 SQL을 실행했는지 확인해.');
    return;
  }
  const payload=await decryptSnapshot(row,c.syncKey);
  applySnapshotPayload(payload);
  cloudSetStatus('원격 불러오기 완료 · Direct Table',row.updated_at||new Date().toISOString());
  showToast('원격 데이터를 이 브라우저에 적용했어.');
};
async function cloudCheckRemote(){
  const c=cloudNeedConfig(); if(!c)return;
  cloudSetStatus('원격 상태 확인 중 · Direct Table...');
  const ids=await cloudIds(c.syncKey);
  const row=await cloudDirectGetRow(ids.sync_id);
  if(!row){cloudSetStatus('원격 데이터 없음 · 이 동기화 키의 행이 없음');showToast('해당 동기화 키로 저장된 row가 없어. 먼저 원격 저장을 눌러.');return;}
  const payload=await decryptSnapshot(row,c.syncKey);
  const size=v14SnapshotSize? v14SnapshotSize(payload) : JSON.stringify(payload).length;
  c.lastVerifiedAt=new Date().toISOString(); c.lastUploadBytes=size;
  cloudSetStatus(`원격 데이터 확인 완료 · ${size.toLocaleString()} bytes · ${row.app_version||'unknown'}`,row.updated_at||'');
  showToast('원격 데이터가 존재하고 복호화까지 성공했어.');
}

document.addEventListener('click',e=>{
  const b=e.target.closest('[data-action],[data-tab]');if(!b)return;
  if(b.dataset.tab){state.previousTab=state.activeTab;state.activeTab=b.dataset.tab;saveUI();render();return}
  const a=b.dataset.action,id=b.dataset.id;
  if(a==='complete-d0')setD0(id,state.activeDate);
  else if(a==='cancel-d0')cancelD0(id);
  else if(a==='pick-date')dateModal(id);
  else if(a==='save-date'){const d=$('#modalDate')?.value;if(d){closeModal();setD0(id,d)}}
  else if(a==='pass-review'){const p=ensureP(id);p.reviews[b.dataset.stage]=state.activeDate;save('복습 통과 저장');render();showToast(`${b.dataset.stage} 복습을 통과 처리했어.`)}
  else if(a==='open-note')noteModal(id);
  else if(a==='save-note'){state.notes[id]=$('#modalNote').value;save('메모 저장');closeModal();render();showToast('메모를 저장했어.')}
  else if(a==='close-modal')closeModal();
  else if(a==='confirm-modal'){const fn=modalAction;modalAction=null;fn?.()}
  else if(a==='toast-undo'){const fn=undoAction;$('#toastRoot').innerHTML='';undoAction=null;fn?.()}
  else if(a==='open-study'){state.previousTab=state.activeTab;state.studyItemId=id;state.activeTab='study';saveUI();render()}
  else if(a==='study-select-item'){updateStudySelection(id)}
  else if(a==='back-study'){state.activeTab=state.previousTab||'today';saveUI();render()}
  else if(a==='open-atlas'){state.activeTab='atlas';saveUI();render()}
  else if(a==='clear-item-filters'){state.itemFilters={q:'',track:'all',rank:'all',subject:'all',section:'all'};saveUI();render()}
  else if(a==='save-settings'){['w125','w34','e125','e34'].forEach(k=>state.settings[k]=Number($('#'+k).value)||0);state.settings.startDate=$('#startDate').value||state.settings.startDate;state.settings.examDate=$('#examDate').value||state.settings.examDate;save('운영 설정 저장');render();showToast('목표량과 시작일을 저장했어.')}
  else if(a==='reset-progress')openConfirm('진도·복습 기록을 초기화할까?','D0와 복습 통과 기록, 오류 메모가 삭제돼. Atlas 개념과 학습 연결 정보는 유지된다.','초기화',()=>{state.progress={};state.notes={};save('진도 초기화');closeModal();render();showToast('진도와 복습 기록을 초기화했어.')});
  else if(a==='export')exportData();
});
document.addEventListener('change',e=>{
  if(e.target.id==='activeDate'){state.activeDate=e.target.value;saveUI();render()}
  if(e.target.id==='importFile'&&e.target.files[0]){importData(e.target.files[0]);e.target.value=''}

/* v17: full data-flow stabilization */
function v17ParseJSONSafe(raw,fallback=null){try{return raw?JSON.parse(raw):fallback}catch{return fallback}}
function v17StorageGet(key){return v17ParseJSONSafe(localStorage.getItem(key),null)}
function v17StorageSet(key,value){localStorage.setItem(key,JSON.stringify(value));if(key===BRIDGE_KEY)bridgeCache=value;return value}
function v17ActiveAtlasFrames(){return ['studyAtlas','globalAtlas'].map(id=>document.getElementById(id)).filter(f=>f&&f.contentWindow)}
function v17FrameRequest(frame,timeout=550){
  return new Promise(resolve=>{
    const requestId='req_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    let done=false;
    const finish=v=>{if(done)return;done=true;window.removeEventListener('message',handler);resolve(v)};
    const handler=e=>{const d=e.data||{};if(d.type==='ipe-atlas-export-response'&&d.requestId===requestId)finish(d)};
    window.addEventListener('message',handler);
    try{frame.contentWindow.postMessage({type:'ipe-atlas-export-request',requestId},'*')}catch{finish(null)}
    setTimeout(()=>finish(null),timeout);
  });
}
async function v17FlushAtlasFromFrames(){
  const frames=v17ActiveAtlasFrames();
  let latest=null;
  for(const f of frames){
    const res=await v17FrameRequest(f);
    if(res?.state){latest=res;break;}
  }
  if(latest?.state){
    v17StorageSet(ATLAS_STORAGE,latest.state);
    if(latest.bridge)v17StorageSet(BRIDGE_KEY,latest.bridge);
    return {source:'iframe',atlas:latest.state,bridge:latest.bridge||bridge()};
  }
  return {source:'localStorage',atlas:v17StorageGet(ATLAS_STORAGE),bridge:bridge()};
}
async function v17FlushAllStores(){
  ensureBridge();
  localStorage.setItem(APP_KEY,JSON.stringify(state));
  const atlas=await v17FlushAtlasFromFrames();
  return {app:state,atlas:atlas.atlas,bridge:atlas.bridge,source:atlas.source};
}
function v17BuildSnapshot(flushed=null){
  ensureBridge();
  return {
    version:17,
    exportedAt:new Date().toISOString(),
    app:state,
    bridge:flushed?.bridge||bridge(),
    atlas:flushed?.atlas||v17StorageGet(ATLAS_STORAGE),
    meta:{appKey:APP_KEY,bridgeKey:BRIDGE_KEY,atlasKey:ATLAS_STORAGE,atlasSource:flushed?.source||'localStorage'}
  };
}
snapshotPayload=function(){return v17BuildSnapshot(null)};
const v17BaseApplySnapshotPayload=applySnapshotPayload;
applySnapshotPayload=function(data){
  if(!data||typeof data!=='object')throw new Error('invalid snapshot');
  if(data.app)state=mergeState(defaultState(),data.app); else state=mergeState(defaultState(),data);
  if(data.bridge)v17StorageSet(BRIDGE_KEY,data.bridge);
  if(data.atlas)v17StorageSet(ATLAS_STORAGE,data.atlas);
  cloudSuppressAuto=true;
  localStorage.setItem(APP_KEY,JSON.stringify(state));
  ensureBridge();
  cloudSuppressAuto=false;
  v17ActiveAtlasFrames().forEach(f=>{try{f.contentWindow.postMessage({type:'ipe-atlas-import-state',state:data.atlas},'*')}catch{}});
  render();
};
function v17SnapshotSize(payload){try{return new TextEncoder().encode(JSON.stringify(payload)).length}catch{return JSON.stringify(payload).length}}
async function cloudDirectGetRowV17(sync_id){
  const c=cloudNeedConfig(); if(!c)return null;
  const url=`${c.url}/rest/v1/learning_os_snapshots?sync_id=eq.${encodeURIComponent(sync_id)}&select=encrypted_state,salt,iv,updated_at,app_version`;
  const res=await fetch(url,{headers:{'apikey':c.anonKey,'Authorization':`Bearer ${c.anonKey}`,'Accept':'application/json'}});
  const text=await res.text();let json=null;try{json=text?JSON.parse(text):null}catch{json=text}
  if(!res.ok)throw new Error(typeof json==='string'?json:(json?.message||`HTTP ${res.status}`));
  return Array.isArray(json)?json[0]:null;
}
cloudFetchRemoteRow=async function(){const c=cloudNeedConfig();if(!c)return null;const ids=await cloudIds(c.syncKey);return cloudDirectGetRowV17(ids.sync_id)};
cloudUploadNow=async function(){
  const c=cloudNeedConfig();if(!c)return;
  cloudSetStatus('전체 저장소 동기화 중...');
  const flushed=await v17FlushAllStores();
  const payload=v17BuildSnapshot(flushed);
  c.lastUploadBytes=v17SnapshotSize(payload);
  cloudSetStatus('원격 저장 중 · Direct Table v17...');
  const ids=await cloudIds(c.syncKey);
  const encrypted=await encryptSnapshot(payload,c.syncKey);
  const row={sync_id:ids.sync_id,write_hash:ids.write_hash,encrypted_state:encrypted.encrypted_state,salt:encrypted.salt,iv:encrypted.iv,updated_at:new Date().toISOString(),app_version:'v17'};
  const res=await fetch(`${c.url}/rest/v1/learning_os_snapshots?on_conflict=sync_id`,{
    method:'POST',headers:{'apikey':c.anonKey,'Authorization':`Bearer ${c.anonKey}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(row)
  });
  const text=await res.text();let json=null;try{json=text?JSON.parse(text):null}catch{json=text}
  if(!res.ok)throw new Error(typeof json==='string'?json:(json?.message||`HTTP ${res.status}`));
  const saved=Array.isArray(json)?json[0]:row;
  const verify=await cloudDirectGetRowV17(ids.sync_id);
  if(!verify)throw new Error('저장 후 원격 row 확인 실패');
  await decryptSnapshot(verify,c.syncKey);
  c.lastVerifiedAt=new Date().toISOString();
  cloudSetStatus('원격 저장 완료 · 전체 데이터 검증 완료',verify.updated_at||saved.updated_at||row.updated_at);
  showToast('전체 데이터 흐름 저장/검증 완료.');
};
cloudDownloadNow=async function(){
  const c=cloudNeedConfig();if(!c)return;
  cloudSetStatus('원격 불러오는 중...');
  const row=await cloudFetchRemoteRow();
  if(!row){cloudSetStatus('원격 데이터 없음');showToast('이 동기화 키로 저장된 원격 데이터가 없어.');return;}
  const payload=await decryptSnapshot(row,c.syncKey);
  applySnapshotPayload(payload);
  cloudSetStatus('원격 불러오기 완료 · 전체 저장소 적용',row.updated_at||new Date().toISOString());
  showToast('원격 데이터를 app/bridge/Atlas 전체에 적용했어.');
};
exportData=async function(){
  const flushed=await v17FlushAllStores();
  const payload=v17BuildSnapshot(flushed);
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`정처기_LearningOS_통합백업_v17_${state.activeDate}.json`;a.click();URL.revokeObjectURL(a.href);showToast('전체 저장소 통합 백업을 내보냈어.');
};
async function v17DataAudit(){
  const flushed=await v17FlushAllStores();
  const app=state, br=flushed.bridge||bridge(), at=flushed.atlas||{};
  const concepts=Array.isArray(at.concepts)?at.concepts:[], frames=Array.isArray(at.frames)?at.frames:[], objects=Array.isArray(at.objects)?at.objects:[];
  const roles={core:0,support:0,general:0,missing:0};
  concepts.forEach(c=>{if(['core','support','general'].includes(c.conceptRole))roles[c.conceptRole]++;else roles.missing++;});
  return {source:flushed.source,progress:Object.keys(app.progress||{}).length,notes:Object.keys(app.notes||{}).length,bridgeLinks:Array.isArray(br.links)?br.links.length:0,concepts:concepts.length,frames:frames.length,objects:objects.length,roles,hasAtlas:!!at,hasBridge:!!br};
}
function v17AuditPanelHtml(a=null){
  const role=a?.roles||{};
  return `<section class="panel"><div class="panel-head"><div><div class="panel-title">데이터 흐름 안정성 점검</div><div class="panel-note">앱 진도, 학습 연결 Bridge, Concept Atlas를 원격 저장 전에 한 번에 flush해서 저장한다.</div></div><button data-action="v17-audit" class="small">전수 점검</button></div><div class="panel-body"><div class="dataflow-grid"><div class="dataflow-card"><b>App</b><span>D0/복습 ${a?a.progress:'—'} · 메모 ${a?a.notes:'—'}</span></div><div class="dataflow-card"><b>Bridge</b><span>학습-개념 연결 ${a?a.bridgeLinks:'—'}</span></div><div class="dataflow-card"><b>Atlas</b><span>개념 ${a?a.concepts:'—'} · 프레임 ${a?a.frames:'—'} · 객체 ${a?a.objects:'—'}</span></div><div class="dataflow-card"><b>개념 라벨</b><span>핵심 ${role.core??'—'} · 보조 ${role.support??'—'} · 일반 ${role.general??'—'}${role.missing?` · 누락 ${role.missing}`:''}</span></div></div><ul class="dataflow-list"><li><b>저장 전 flush:</b> 현재 열린 Atlas iframe → parent localStorage → 원격 snapshot 순서로 고정.</li><li><b>보존 필드:</b> conceptRole, importance, related, objects, frame description/config, concept array order.</li><li><b>원격 검증:</b> 저장 직후 같은 sync_id를 다시 select하고 복호화까지 확인.</li></ul>${a?`<div class="notice" style="margin-top:12px">마지막 점검: Atlas source = <b>${esc(a.source)}</b></div>`:''}</div></section>`;
}
const v17BaseRenderSettings=renderSettings;
let v17AuditResult=null;
renderSettings=function(){return v17BaseRenderSettings()+v17AuditPanelHtml(v17AuditResult)};
document.addEventListener('click',async e=>{const b=e.target.closest('[data-action="v17-audit"]');if(!b)return;e.preventDefault();try{v17AuditResult=await v17DataAudit();render();showToast('데이터 흐름 전수 점검 완료.')}catch(err){showToast('데이터 점검 실패: '+err.message)}},true);
window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='ipe-atlas-saved'){
    if(d.state)v17StorageSet(ATLAS_STORAGE,d.state);
    if(d.bridge)v17StorageSet(BRIDGE_KEY,d.bridge);
    const chip=$('#saveChip');if(chip)chip.textContent='Atlas 저장 반영 · 이 브라우저';
  }
});

let bridgeRefreshRaf=0;window.addEventListener('message',e=>{if(e.data?.type==='ipe-atlas-bridge-updated'){invalidateBridgeCache();if(state.activeTab==='dashboard'&&!bridgeRefreshRaf)bridgeRefreshRaf=requestAnimationFrame(()=>{bridgeRefreshRaf=0;if(state.activeTab==='dashboard')render()})}});
ensureBridge();render();
</script>
