<style>

*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 12% 0%,#162d4c 0,transparent 34%),radial-gradient(circle at 85% 10%,#142a40 0,transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}

.notice{border:1px solid #285077;background:linear-gradient(90deg,rgba(32,87,132,.34),rgba(21,36,58,.82));padding:13px 15px;border-radius:13px;color:#cae9ff;font-size:13px;line-height:1.55;margin-bottom:18px}.notice strong{color:#fff}

.grid{display:grid;gap:16px}.grid.two{grid-template-columns:1fr 1fr}.panel{background:rgba(17,28,46,.9);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-title{font-size:15px;font-weight:850}.panel-note{font-size:12px;color:var(--muted)}.panel-body{padding:14px 16px}.lane-125{border-top:3px solid var(--accent)}.lane-34{border-top:3px solid var(--violet)}.section-label{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.09em;margin:2px 0 10px}.empty{border:1px dashed #314a68;border-radius:12px;padding:15px;color:var(--muted);font-size:13px;text-align:center}
.card{border:1px solid #2a415f;background:#101b2d;border-radius:13px;padding:12px;margin-bottom:9px}.card:last-child{margin-bottom:0}.card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.item-name{font-weight:800;line-height:1.4}.meta{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45}.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.chip{font-size:11px;font-weight:800;border-radius:99px;padding:4px 7px;border:1px solid #344c6a;background:#14263d;color:#bfdbfe}.chip.a{background:#432c34;border-color:#854253;color:#ffd4d8}.chip.b{background:#463a24;border-color:#836b38;color:#ffe0a1}.chip.c{background:#1c3e44;border-color:#327682;color:#b9eff8}.chip.d{background:#253045;border-color:#465b7e;color:#c9d5ea}.chip.stage{background:#2c234a;border-color:#6758a6;color:#d6ceff}.chip.overdue{background:#522934;border-color:#9d4657;color:#ffd5db}.chip.due{background:#3e331d;border-color:#806831;color:#ffe1a6}.card-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}.small-note{font-size:12px;color:#b8c9dc;line-height:1.45;margin-top:9px;padding:8px 9px;border-left:2px solid #3c7bb4;background:#0d1727;border-radius:0 8px 8px 0}
.today-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}.review-board{min-height:250px}.review-group{margin-bottom:15px}.review-group:last-child{margin-bottom:0}.group-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:850;margin:0 0 8px}.dot{width:8px;height:8px;border-radius:50%;display:inline-block}.dot.red{background:var(--danger)}.dot.yellow{background:var(--warn)}.dot.blue{background:var(--accent)}.dot.purple{background:var(--violet)}

.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.toolbar .spacer{flex:1}.toolbar input,.toolbar select{min-height:36px}.list{border:1px solid var(--line);border-radius:14px;overflow:hidden}.row{display:grid;grid-template-columns:70px 1.4fr .8fr .9fr 180px;gap:10px;align-items:center;padding:11px 12px;border-bottom:1px solid #23364f;background:#101b2d}.row:last-child{border-bottom:0}.row:hover{background:#14223a}.row-name{font-weight:800;line-height:1.35}.row-sub{font-size:11px;color:var(--muted);line-height:1.45;margin-top:3px}.row-actions{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.row-actions input{font-size:12px;padding:6px;max-width:120px}.status{font-size:12px;font-weight:800}.status.not{color:var(--muted)}.status.done{color:var(--accent2)}.status.late{color:var(--danger)}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}.modal{width:min(650px,100%);background:#101b2d;border:1px solid #3a5578;border-radius:18px;box-shadow:0 20px 70px rgba(0,0,0,.5);overflow:hidden}.modal-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-body{padding:16px}.modal-body label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.modal-body textarea{width:100%;min-height:110px;resize:vertical;background:#0b1525;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px}.modal-foot{padding:14px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}

</head>

<div class="app">
  <header class="topbar">
    <div>
      <div class="eyebrow">ADAPTIVE STUDY CONTROL</div>
      <h1 class="title">정처기 적응형 복습 운영 시스템</h1>
      <p class="subtitle">고정 날짜표가 아니라 <b>실제 D0 완료일</b>을 기준으로 복습이 자동 생성되는 두 레일 학습 시스템.</p>
    </div>
    <div class="top-actions">
      <div class="date-wrap"><label for="activeDate">운영 날짜</label><input id="activeDate" type="date" /></div>
      <button class="ghost" data-action="export">백업 내보내기</button>
      <label class="ghost" for="importFile">백업 불러오기</label><input id="importFile" type="file" accept="application/json" class="hidden" />
    </div>
  </header>

  <div class="notice"><strong>핵심 구조:</strong> 1·2·5와 3·4는 매일 병렬로 진도를 나간다. 새 항목을 실제로 끝낸 날에만 D0를 찍고, 이후 D+1·3·7·14·21은 그 날짜에서 자동 계산된다. 오늘 더 많이 끝내도 <strong>나머지 표를 다시 고칠 필요가 없다.</strong></div>

  <nav class="nav" id="nav">
    <button data-tab="today" class="active">오늘 실행</button>
    <button data-tab="backlog">새 진도 레일</button>
    <button data-tab="items">전체 항목</button>
    <button data-tab="settings">운영 설정</button>
  </nav>

  <main id="main"></main>
  <div class="footer">데이터는 이 브라우저의 기기에만 저장된다. 브라우저 데이터를 지우기 전에는 <b>백업 내보내기</b>로 JSON 파일을 저장해 두는 게 안전하다.</div>
</div>

const STORAGE_KEY = 'jeongcheogi-adaptive-review-v1';
const STAGES = {A:[['D+1',1],['D+3',3],['D+7',7],['D+14',14],['D+21',21]],B:[['D+1',1],['D+7',7],['D+21',21]],C:[['D+3',3],['D+14',14]],D:[['D+7',7]]};
const STAGE_DESC = {'D+1':'핵심 인출','D+3':'재구성','D+7':'변형·수행','D+14':'압축 회상','D+21':'통합 확인'};
const PRIORITY = {'D+1':1,'D+7':2,'D+3':3,'D+14':4,'D+21':5};
const DEFAULT = {activeTab:'today',activeDate:todayKey(),settings:{w125:2,w34:2,e125:4,e34:4,examDate:'2026-08-07'},progress:{},notes:{}};
let state = loadState();

function todayKey(){const d=new Date();return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function loadState(){try{const raw=JSON.parse(localStorage.getItem(STORAGE_KEY));return raw?mergeDeep(DEFAULT,raw):structuredClone(DEFAULT)}catch{return structuredClone(DEFAULT)}}
function mergeDeep(base,add){const out=structuredClone(base);for(const k in add){if(add[k]&&typeof add[k]==='object'&&!Array.isArray(add[k]))out[k]=mergeDeep(out[k]||{},add[k]);else out[k]=add[k]}return out}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function fmtDate(v){if(!v)return '—';const [y,m,d]=v.split('-').map(Number);return `${m}/${d}`}
function addDays(key,n){const [y,m,d]=key.split('-').map(Number);const x=new Date(y,m-1,d+n);return [x.getFullYear(),String(x.getMonth()+1).padStart(2,'0'),String(x.getDate()).padStart(2,'0')].join('-')}
function diffDays(a,b){const [ya,ma,da]=a.split('-').map(Number),[yb,mb,db]=b.split('-').map(Number);return Math.round((Date.UTC(ya,ma-1,da)-Date.UTC(yb,mb-1,db))/86400000)}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function getP(id){return state.progress[id]||null}
function completedItems(){return ITEMS.filter(i=>getP(i.id)?.d0)}
function itemStatus(item){const p=getP(item.id);if(!p?.d0)return {label:'미시작',cls:'not'};const pending=getReviews(item).filter(x=>!x.done);if(!pending.length)return {label:'S4 마스터',cls:'done'};return {label:`진행 중 · ${pending[0].stage}`,cls:'done'}}
function getReviews(item){const p=getP(item.id);if(!p?.d0)return [];return STAGES[item.rank].map(([stage,offset])=>{const due=addDays(p.d0,offset);return {stage,offset,due,done:!!p.reviews?.[stage],doneDate:p.reviews?.[stage]||null}})}
function dueReviews(date){const list=[];for(const item of ITEMS){for(const r of getReviews(item)){if(!r.done&&r.due<=date)list.push({item,...r,overdue:r.due<date})}}return list.sort((a,b)=>Number(b.overdue)-Number(a.overdue)||PRIORITY[a.stage]-PRIORITY[b.stage]||a.due.localeCompare(b.due)||a.item.id.localeCompare(b.item.id))}
function targetFor(track,date){const d=new Date(date+'T00:00:00');const weekend=d.getDay()===0||d.getDay()===6;const s=state.settings;return track==='1·2·5'?(weekend?Number(s.e125):Number(s.w125)):(weekend?Number(s.e34):Number(s.w34))}
function getTrackUnitsDone(track,date){return ITEMS.filter(i=>i.track===track&&getP(i.id)?.d0===date).reduce((a,i)=>a+i.unit,0)}
function nextItems(track,limitUnits){let used=0,ans=[];for(const item of ITEMS.filter(i=>i.track===track&&!getP(i.id)?.d0)){if(used+item.unit>limitUnits+0.001)break;ans.push(item);used+=item.unit}return ans}
function completedReviewCount(){return ITEMS.reduce((sum,item)=>sum+getReviews(item).filter(r=>r.done).length,0)}
function totalReviewCount(){return ITEMS.reduce((sum,item)=>sum+STAGES[item.rank].length,0)}
function percent(n,d){return d?Math.round(n/d*100):0}
function titleStats(){const done=completedItems().length, due=dueReviews(state.activeDate);const allReviews=totalReviewCount(),doneReviews=completedReviewCount();return `<section class="stats">
  <div class="stat"><div class="k">D0 완료 항목</div><div class="v accent">${done}<span style="font-size:15px;color:var(--muted)"> / ${ITEMS.length}</span></div><div class="progress"><div style="width:${percent(done,ITEMS.length)}%"></div></div><div class="sub">전범위 구조화 진도</div></div>
  <div class="stat"><div class="k">오늘 처리할 복습</div><div class="v ${due.length?'yellow':'green'}">${due.length}</div><div class="sub">기한 도래 + 미처리 누적</div></div>
  <div class="stat"><div class="k">복습 통과 누적</div><div class="v green">${doneReviews}<span style="font-size:15px;color:var(--muted)"> / ${allReviews}</span></div><div class="progress"><div style="width:${percent(doneReviews,allReviews)}%"></div></div><div class="sub">랭크별 간격 반복</div></div>
  <div class="stat"><div class="k">시험일</div><div class="v">${fmtDate(state.settings.examDate)}</div><div class="sub">운영 날짜 기준 ${diffDays(state.settings.examDate,state.activeDate)}일 남음</div></div>
</section>`}
function tag(rank){return `<span class="chip ${rank.toLowerCase()}">${rank}랭크</span>`}
function itemCard(item, extra=''){
 const p=getP(item.id), status=itemStatus(item);
 return `<article class="card"><div class="card-top"><div><div class="item-name">${esc(item.id)} · ${esc(item.name)}</div><div class="meta">${esc(item.subject)} · ${esc(item.section)} · ${esc(item.typeCode)} ${esc(item.typeName)}</div></div>${tag(item.rank)}</div><div class="chip-row"><span class="chip">난도 ${item.difficulty}</span><span class="chip">실습 ${item.practice}</span><span class="chip">${item.unit}단위</span>${p?.d0?`<span class="chip stage">D0 ${fmtDate(p.d0)}</span>`:''}</div>${extra}</article>`
}
function reviewCard(x){const tone=x.overdue?'overdue':'due';const when=x.overdue?`${fmtDate(x.due)} 기한 경과`:`오늘 ${x.stage}`;return `<article class="card"><div class="card-top"><div><div class="item-name">${esc(x.item.id)} · ${esc(x.item.name)}</div><div class="meta">${esc(x.item.subject)} · ${esc(x.item.typeCode)} ${esc(x.item.typeName)} · D0 ${fmtDate(getP(x.item.id).d0)}</div></div>${tag(x.item.rank)}</div><div class="chip-row"><span class="chip stage">${x.stage} · ${STAGE_DESC[x.stage]}</span><span class="chip ${tone}">${when}</span></div><div class="small-note">${stageInstruction(x.item,x.stage)}</div><div class="card-actions"><button class="btn success mini" data-action="pass-review" data-id="${x.item.id}" data-stage="${x.stage}">통과 처리</button><button class="btn warn mini" data-action="open-note" data-id="${x.item.id}">오류 기록</button><button class="btn danger mini" data-action="relearn" data-id="${x.item.id}">재학습(D0 재설정)</button></div></article>`}
function stageInstruction(item,stage){if(stage==='D+1')return '무노트로 핵심 정의·구분·단계·구조를 먼저 말하고, 노트는 그 다음 확인한다.';if(stage==='D+3')return `${esc(item.typeName)} 방식으로 산출물을 빈 상태에서 다시 복원한다.`;if(stage==='D+7')return item.practice>=2?'변형 조건을 넣어 SQL·코드·손풀이·사례 판단 중 하나를 실제 수행한다.':'새로운 조건 1개를 붙여 적용하거나 함정 문항을 푼다.';if(stage==='D+14')return '압축 노트만 보고 혼동쌍·오류 포인트를 제거한다.';return 'GPT 신규 문제 또는 기출 전환 전 최종 판정으로, 설명·적용을 함께 확인한다.'}
function groupReviews(list){const groups={};for(const x of list)(groups[x.stage]??=[]).push(x);return groups}
function renderToday(){const due=dueReviews(state.activeDate), groups=groupReviews(due);const t125=targetFor('1·2·5',state.activeDate),t34=targetFor('3·4',state.activeDate);const done125=getTrackUnitsDone('1·2·5',state.activeDate),done34=getTrackUnitsDone('3·4',state.activeDate);const next125=nextItems('1·2·5',Math.max(0,t125-done125));const next34=nextItems('3·4',Math.max(0,t34-done34));
 const reviewHtml=due.length?Object.entries(groups).sort((a,b)=>PRIORITY[a[0]]-PRIORITY[b[0]]).map(([stage,list])=>`<section class="review-group"><h3 class="group-title"><span class="dot ${list.some(x=>x.overdue)?'red':stage==='D+7'?'yellow':stage==='D+21'?'purple':'blue'}"></span>${stage} · ${STAGE_DESC[stage]} <span class="panel-note">${list.length}개</span></h3>${list.map(reviewCard).join('')}</section>`).join(''):`<div class="empty">오늘 도래한 복습이 없어. 신규 진도 또는 기존 오류 보완에 집중하면 돼.</div>`;
 const lane=(track,target,done,next,cls)=>`<section class="panel ${cls}"><div class="panel-head"><div><div class="panel-title">${track} 신규 레일</div><div class="panel-note">오늘 목표 ${target}단위 · 실제 D0 ${done.toFixed(2)}단위</div></div><span class="chip ${done>=target?'stage':''}">${done>=target?'목표 달성':'진행 중'}</span></div><div class="panel-body">${next.length?next.map(i=>itemCard(i,`<div class="card-actions"><button class="btn primary mini" data-action="complete-d0" data-id="${i.id}">오늘 D0 완료</button><button class="btn mini" data-action="open-note" data-id="${i.id}">메모</button></div>`)).join(''):`<div class="empty">오늘 목표량은 채웠어. 더 진행했다면 아래 전체 항목에서 다음 항목을 D0 완료로 찍으면 된다.</div>`}</div></section>`;
 return `${titleStats()}<section class="today-grid"><section class="panel review-board"><div class="panel-head"><div><div class="panel-title">오늘의 복습 큐</div><div class="panel-note">기한 경과 → D+1 → D+7 → D+3 → D+14 → D+21 순</div></div><button class="ghost mini" data-action="show-overdue">미처리만 보기</button></div><div class="panel-body">${reviewHtml}</div></section><section class="grid">${lane('1·2·5',t125,done125,next125,'lane-125')}${lane('3·4',t34,done34,next34,'lane-34')}</section></section>`}
function renderBacklog(){const renderLane=(track,cls)=>{const completed=ITEMS.filter(i=>i.track===track&&getP(i.id)?.d0).length;const all=ITEMS.filter(i=>i.track===track).length;const upcoming=ITEMS.filter(i=>i.track===track&&!getP(i.id)?.d0).slice(0,18);return `<section class="panel ${cls}"><div class="panel-head"><div><div class="panel-title">${track} 레일</div><div class="panel-note">${completed}/${all} 항목 D0 완료 · 내부 순서는 고정, 날짜는 실제 완료일로만 생성</div></div><span class="chip">${percent(completed,all)}%</span></div><div class="panel-body">${upcoming.length?upcoming.map((i,idx)=>itemCard(i,`<div class="card-actions"><button class="btn primary mini" data-action="complete-d0" data-id="${i.id}">운영 날짜로 D0 완료</button><button class="btn mini" data-action="open-note" data-id="${i.id}">메모</button>${idx===0?'<span class="chip stage">현재 다음 항목</span>':''}</div>`)).join(''):`<div class="empty">이 레일의 신규 항목을 전부 D0 처리했어.</div>`}</div></section>`};return `${titleStats()}<div class="grid two">${renderLane('1·2·5','lane-125')}${renderLane('3·4','lane-34')}</div>`}
function renderItems(){const filters=state.filters||{track:'all',rank:'all',q:''};const filtered=ITEMS.filter(i=>(filters.track==='all'||i.track===filters.track)&&(filters.rank==='all'||i.rank===filters.rank)&&(`${i.id} ${i.name} ${i.subject} ${i.section} ${i.typeCode}`.toLowerCase().includes((filters.q||'').toLowerCase())));const rows=filtered.map(i=>{const p=getP(i.id),st=itemStatus(i);return `<div class="row"><div>${tag(i.rank)}</div><div><div class="row-name">${esc(i.id)} · ${esc(i.name)}</div><div class="row-sub">${esc(i.track)} · ${esc(i.subject)} · ${esc(i.section)} · ${esc(i.typeCode)} ${esc(i.typeName)}</div></div><div><div class="row-sub">난도 ${i.difficulty} · 실습 ${i.practice}</div><div class="row-sub">${i.unit}단위</div></div><div><div class="status ${st.cls}">${st.label}</div><div class="row-sub">${p?.d0?`D0 ${fmtDate(p.d0)}`:'아직 D0 없음'}</div></div><div class="row-actions">${p?.d0?`<button class="btn mini" data-action="open-note" data-id="${i.id}">메모</button><button class="btn danger mini" data-action="relearn" data-id="${i.id}">D0 재설정</button>`:`<button class="btn primary mini" data-action="complete-d0" data-id="${i.id}">D0 완료</button><button class="btn mini" data-action="choose-d0" data-id="${i.id}">날짜 지정</button>`}</div></div>`}).join('');return `${titleStats()}<section class="panel"><div class="panel-head"><div><div class="panel-title">전체 157개 항목</div><div class="panel-note">D0를 실제로 완료한 날짜만 기록하면 복습일이 자동으로 붙는다.</div></div><span class="panel-note">${filtered.length}개 표시</span></div><div class="panel-body"><div class="toolbar"><input id="searchItems" placeholder="번호, 항목명, 과목, 유형 검색" value="${esc(filters.q||'')}" /><select id="filterTrack"><option value="all">전체 레일</option><option value="1·2·5" ${filters.track==='1·2·5'?'selected':''}>1·2·5</option><option value="3·4" ${filters.track==='3·4'?'selected':''}>3·4</option></select><select id="filterRank"><option value="all">전체 랭크</option>${['A','B','C','D'].map(r=>`<option value="${r}" ${filters.rank===r?'selected':''}>${r}랭크</option>`).join('')}</select><div class="spacer"></div><button class="ghost mini" data-action="clear-filters">필터 초기화</button></div><div class="list">${rows||'<div class="empty">조건에 맞는 항목이 없어.</div>'}</div></div></section>`}
function renderSettings(){const s=state.settings;return `<section class="panel"><div class="panel-head"><div><div class="panel-title">운영 설정</div><div class="panel-note">여기서 목표량을 바꿔도 이미 완료한 항목의 복습 일정은 흔들리지 않는다.</div></div></div><div class="panel-body"><div class="settings-grid"><div class="setting"><label>평일 1·2·5 신규 목표 (A환산)</label><input id="w125" type="number" step="0.25" min="0" value="${s.w125}"><div class="help">기본 2단위</div></div><div class="setting"><label>평일 3·4 신규 목표 (A환산)</label><input id="w34" type="number" step="0.25" min="0" value="${s.w34}"><div class="help">기본 2단위</div></div><div class="setting"><label>주말 1·2·5 신규 목표 (A환산)</label><input id="e125" type="number" step="0.25" min="0" value="${s.e125}"><div class="help">기본 4단위</div></div><div class="setting"><label>주말 3·4 신규 목표 (A환산)</label><input id="e34" type="number" step="0.25" min="0" value="${s.e34}"><div class="help">기본 4단위</div></div><div class="setting"><label>시험일</label><input id="examDate" type="date" value="${s.examDate}"><div class="help">대시보드의 D-day 표시용</div></div></div><div class="card-actions" style="margin-top:16px"><button class="btn primary" data-action="save-settings">설정 저장</button><button class="btn danger" data-action="reset-all">전체 진행 기록 초기화</button></div><div class="notice" style="margin:16px 0 0">A: D+1·3·7·14·21 / B: D+1·7·21 / C: D+3·14 / D: D+7. <b>재학습</b>을 누르면 해당 항목의 D0가 운영 날짜로 다시 찍히고, 기존 복습 완료 기록은 지워진다.</div></div></section>`}
function render(){document.getElementById('activeDate').value=state.activeDate;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.activeTab));let content='';if(state.activeTab==='today')content=renderToday();else if(state.activeTab==='backlog')content=renderBacklog();else if(state.activeTab==='items')content=renderItems();else content=renderSettings();document.getElementById('main').innerHTML=content;bindInputs();}
function bindInputs(){const q=document.getElementById('searchItems');if(q)q.addEventListener('input',e=>{state.filters={...(state.filters||{}),q:e.target.value};save();render()});const ft=document.getElementById('filterTrack');if(ft)ft.addEventListener('change',e=>{state.filters={...(state.filters||{}),track:e.target.value};save();render()});const fr=document.getElementById('filterRank');if(fr)fr.addEventListener('change',e=>{state.filters={...(state.filters||{}),rank:e.target.value};save();render()})}
function ensureP(id){return state.progress[id]??={d0:null,reviews:{}}}
function setD0(id,date){const p=ensureP(id);p.d0=date;p.reviews={};save();render()}
function passReview(id,stage){const p=ensureP(id);p.reviews[stage]=state.activeDate;save();render()}
function openModal(id,mode='note'){const item=ITEMS.find(i=>i.id===id);const p=getP(id)||{d0:'',reviews:{}};const root=document.getElementById('modalRoot');if(mode==='date'){root.innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="modal-head"><b>D0 날짜 지정 · ${esc(item.id)} ${esc(item.name)}</b><button class="ghost mini" data-action="close-modal">닫기</button></div><div class="modal-body"><label>실제로 이 항목을 구조화·초회 통과한 날짜</label><input id="modalDate" type="date" value="${p.d0||state.activeDate}" /></div><div class="modal-foot"><button class="btn primary" data-action="save-modal-date" data-id="${id}">D0 저장</button></div></div></div>`;return}root.innerHTML=`<div class="modal-backdrop"><div class="modal"><div class="modal-head"><b>${esc(item.id)} · ${esc(item.name)} — 오류/보완 메모</b><button class="ghost mini" data-action="close-modal">닫기</button></div><div class="modal-body"><div class="meta" style="margin:0 0 12px">${esc(item.typeCode)} ${esc(item.typeName)} · 권장 행동: ${esc(item.recommendedAction)}</div><label>오류 유형, 혼동쌍, 다음 재시험 때 확인할 포인트</label><textarea id="modalNote" placeholder="예: LEFT JOIN에서 NULL 행 포함 조건을 반대로 기억함">${esc(state.notes[id]||'')}</textarea></div><div class="modal-foot"><button class="btn primary" data-action="save-note" data-id="${id}">메모 저장</button></div></div></div>`}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`정처기_복습운영백업_${state.activeDate}.json`;a.click();URL.revokeObjectURL(a.href)}
function importData(file){const reader=new FileReader();reader.onload=()=>{try{state=mergeDeep(DEFAULT,JSON.parse(reader.result));save();render();alert('백업을 불러왔어.')}catch{alert('백업 파일 형식을 읽지 못했어.')}};reader.readAsText(file)}

document.getElementById('activeDate').addEventListener('change',e=>{state.activeDate=e.target.value;save();render()});
document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importData(e.target.files[0]);e.target.value=''})
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button[data-tab]');if(!b)return;state.activeTab=b.dataset.tab;save();render()})
document.addEventListener('click',e=>{const b=e.target.closest('[data-action]');if(!b)return;const a=b.dataset.action,id=b.dataset.id;if(a==='complete-d0')setD0(id,state.activeDate);if(a==='choose-d0')openModal(id,'date');if(a==='pass-review')passReview(id,b.dataset.stage);if(a==='relearn'){if(confirm('이 항목을 운영 날짜로 재학습 처리할까? 기존 복습 통과 기록은 초기화돼.'))setD0(id,state.activeDate)}if(a==='open-note')openModal(id);if(a==='close-modal')closeModal();if(a==='save-note'){state.notes[id]=document.getElementById('modalNote').value;save();closeModal();render()}if(a==='save-modal-date'){const d=document.getElementById('modalDate').value;if(d)setD0(id,d);closeModal()}if(a==='export')exportData();if(a==='clear-filters'){state.filters={track:'all',rank:'all',q:''};save();render()}if(a==='save-settings'){['w125','w34','e125','e34','examDate'].forEach(k=>{const el=document.getElementById(k);state.settings[k]=k==='examDate'?el.value:Number(el.value)});save();render()}if(a==='reset-all'){if(confirm('모든 D0·복습 통과·메모가 삭제돼. 정말 초기화할까?')){state=structuredClone(DEFAULT);save();render()}}if(a==='show-overdue'){alert('빨간 기한 경과 항목부터 처리하면 돼. D+1 A/B와 D+7 A는 가능한 한 밀지 않는 게 원칙이야.')}})

document.querySelector('.subtitle').innerHTML='실제 <b>D0 완료일</b>을 기준으로 진도·복습·달성률을 함께 관리하는 1·2·5 / 3·4 병렬 학습 시스템.';
document.querySelector('.notice').innerHTML='<strong>핵심 구조:</strong> 평일은 총 <b>6 A환산</b>(1·2·5 = 3, 3·4 = 3), 주말은 총 <b>12 A환산</b>(각 6)으로 기본 설정되어 있다. 항목을 실제로 끝낸 날에만 D0 완료를 찍으면, 복습 일정과 오늘·주간·월간 달성률이 자동으로 갱신된다.';
document.querySelector('.footer').innerHTML='새로고침해도 같은 브라우저 안에서는 자동 저장된 기록이 유지된다. 단, 시크릿 모드·브라우저 데이터 삭제·다른 기기에서는 보장되지 않으므로 중요한 시점에는 <b>백업 내보내기</b>로 JSON을 저장해 두는 게 안전하다.';
const nav=document.getElementById('nav');
if(!nav.querySelector('[data-tab="dashboard"]')) nav.insertAdjacentHTML('afterbegin','<button data-tab="dashboard">대시보드</button>');
const topActions=document.querySelector('.top-actions');
if(!document.getElementById('saveStatus')) topActions.insertAdjacentHTML('afterbegin','<div class="save-status" id="saveStatus"><span class="save-dot"></span><span>자동 저장 · 이 브라우저</span></div>');
if(!document.getElementById('toastRoot')) document.body.insertAdjacentHTML('beforeend','<div id="toastRoot"></div>');

// v1의 기본값 4A/8A만 6A/12A로 이관. 사용자가 직접 바꾼 값은 유지.
if(!state.settings.targetV2){
  const s=state.settings;
  if(Number(s.w125)===2&&Number(s.w34)===2&&Number(s.e125)===4&&Number(s.e34)===4){Object.assign(s,{w125:3,w34:3,e125:6,e34:6});}
  s.targetV2=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function save(msg='자동 저장됨'){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  const el=document.getElementById('saveStatus');
  if(el) el.innerHTML='<span class="save-dot"></span><span>'+esc(msg)+' · 이 브라우저</span>';
}
function fullDayTarget(date){return targetFor('1·2·5',date)+targetFor('3·4',date)}
function dateObj2(key){const [y,m,d]=key.split('-').map(Number);return new Date(y,m-1,d)}
function keyOf2(d){return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function mondayOf2(key){const d=dateObj2(key);d.setDate(d.getDate()-((d.getDay()+6)%7));return keyOf2(d)}
function firstOfMonth2(key){return key.slice(0,7)+'-01'}
function unitsDoneOn2(date,track='all'){return ITEMS.filter(i=>(track==='all'||i.track===track)&&getP(i.id)?.d0===date).reduce((sum,i)=>sum+i.unit,0)}
function unitsDoneRange2(start,end,track='all'){return ITEMS.filter(i=>{const d=getP(i.id)?.d0;return d&&(track==='all'||i.track===track)&&d>=start&&d<=end}).reduce((sum,i)=>sum+i.unit,0)}
function targetRange2(start,end,track='all'){let total=0,d=dateObj2(start),last=dateObj2(end);while(d<=last){const key=keyOf2(d);total+=track==='all'?fullDayTarget(key):targetFor(track,key);d.setDate(d.getDate()+1)}return total}
function metric2(label,done,target,detail=''){const p=percent(done,target);return `<div class="metric"><div class="label">${label}</div><div class="value ${p>=100?'green':'accent'}">${p}%</div><div class="detail">${done.toFixed(2)} / ${target.toFixed(2)} A${detail?` · ${detail}`:''}</div><div class="progress ${done>target?'over':''}"><div style="width:${Math.min(100,p)}%"></div></div></div>`}
function snapshot2(date){const weekStart=mondayOf2(date),monthStart=firstOfMonth2(date);return {today:{done:unitsDoneOn2(date),target:fullDayTarget(date)},week:{done:unitsDoneRange2(weekStart,date),target:targetRange2(weekStart,date)},month:{done:unitsDoneRange2(monthStart,date),target:targetRange2(monthStart,date)}}}
function nextItems(track,limitUnits){if(limitUnits<=0)return [];let used=0,ans=[];for(const item of ITEMS.filter(i=>i.track===track&&!getP(i.id)?.d0)){ans.push(item);used+=item.unit;if(used>=limitUnits-.001)break}return ans}
function miniItem2(item,actions=''){return `<div class="mini-item"><b>${esc(item.id)} · ${esc(item.name)} ${tag(item.rank)}</b><div class="line">${item.unit}A · ${esc(item.typeCode)} · 난도 ${item.difficulty}</div>${actions?`<div class="card-actions">${actions}</div>`:''}</div>`}

function titleStats(){
  const s=snapshot2(state.activeDate),done=completedItems().length,due=dueReviews(state.activeDate),reviewDone=completedReviewCount(),reviewAll=totalReviewCount();
  const box=(label,obj,sub)=>`<div class="stat"><div class="k">${label}</div><div class="v ${percent(obj.done,obj.target)>=100?'green':'accent'}">${percent(obj.done,obj.target)}%</div><div class="progress"><div style="width:${Math.min(100,percent(obj.done,obj.target))}%"></div></div><div class="sub">${obj.done.toFixed(2)} / ${obj.target.toFixed(2)} A${sub?` · ${sub}`:''}</div></div>`;
  return `<section class="stats">${box('오늘 진도 달성률',s.today)}${box('이번 주 누적 달성률',s.week)}${box('이번 달 누적 달성률',s.month)}<div class="stat"><div class="k">전범위 구조화 / 복습</div><div class="v accent">${done}<span style="font-size:15px;color:var(--muted)"> / ${ITEMS.length}</span></div><div class="progress"><div style="width:${percent(done,ITEMS.length)}%"></div></div><div class="sub">복습 ${reviewDone} / ${reviewAll} · 오늘 도래 ${due.length}개</div></div></section>`;
}
function lanePlan2(track){
  const target=targetFor(track,state.activeDate),done=unitsDoneOn2(state.activeDate,track);
  const todayDone=ITEMS.filter(i=>i.track===track&&getP(i.id)?.d0===state.activeDate);
  const next=nextItems(track,Math.max(0,target-done));
  return `<section class="lane-column ${track==='1·2·5'?'lane-125':'lane-34'}"><div class="lane-title"><span>${track} 레일</span><span class="chip ${done>=target?'done':''}">${done.toFixed(2)} / ${target.toFixed(2)} A</span></div><div class="lane-sub">실제 D0 완료 기준 · 두 레일 병렬 진행</div><div class="section-label">오늘 완료</div><div class="mini-list">${todayDone.length?todayDone.map(i=>miniItem2(i,`<button class="btn danger mini" data-action="undo-d0" data-id="${i.id}">D0 취소</button><button class="btn mini" data-action="open-note" data-id="${i.id}">메모</button>`)).join(''):'<div class="empty">아직 D0 완료 항목이 없어.</div>'}</div><div class="section-label" style="margin-top:12px">다음 추천 진도</div><div class="mini-list">${next.length?next.map(i=>miniItem2(i,`<button class="btn primary mini" data-action="complete-d0" data-id="${i.id}">D0 완료</button><button class="btn mini" data-action="choose-d0" data-id="${i.id}">날짜 지정</button>`)).join(''):'<div class="empty">오늘 목표 달성. 더 진행하면 전체 항목에서 추가 D0 처리해.</div>'}</div></section>`;
}
function renderTodayProgress2(){
  const s=snapshot2(state.activeDate);
  return `<section class="panel progress-board"><div class="panel-head"><div><div class="panel-title">오늘의 진도</div><div class="panel-note">오늘 실행의 첫 작업: 두 레일 신규 진도와 오늘·주간·월간 달성률을 먼저 확인한다.</div></div><span class="chip stage">${fmtDate(state.activeDate)} 기준</span></div><div class="panel-body"><div class="progress-summary">${metric2('오늘',s.today.done,s.today.target)}${metric2('이번 주',s.week.done,s.week.target,fmtDate(mondayOf2(state.activeDate))+'~오늘')}${metric2('이번 달',s.month.done,s.month.target,state.activeDate.slice(0,7)+' 누적')}</div><div class="lane-plan">${lanePlan2('1·2·5')}${lanePlan2('3·4')}</div></div></section>`;
}
function renderToday(){
  const due=dueReviews(state.activeDate),groups=groupReviews(due);
  const reviewHtml=due.length?Object.entries(groups).sort((a,b)=>PRIORITY[a[0]]-PRIORITY[b[0]]).map(([stage,list])=>`<section class="review-group"><h3 class="group-title"><span class="dot ${list.some(x=>x.overdue)?'red':stage==='D+7'?'yellow':stage==='D+21'?'purple':'blue'}"></span>${stage} · ${STAGE_DESC[stage]} <span class="panel-note">${list.length}개</span></h3>${list.map(reviewCard).join('')}</section>`).join(''):'<div class="empty">오늘 도래한 복습이 없어. 신규 진도 또는 오류 보완에 집중하면 돼.</div>';
  return `${titleStats()}${renderTodayProgress2()}<section class="panel"><div class="panel-head"><div><div class="panel-title">오늘의 복습 큐</div><div class="panel-note">기한 경과 → D+1 → D+7 → D+3 → D+14 → D+21 순으로 처리</div></div><span class="chip ${due.length?'overdue':'done'}">${due.length?due.length+'개 대기':'대기 없음'}</span></div><div class="panel-body">${reviewHtml}</div></section>`;
}
function renderDashboard(){
  const s=snapshot2(state.activeDate),done=completedItems().length,reviewDone=completedReviewCount(),reviewAll=totalReviewCount();
  let d=dateObj2(addDays(state.activeDate,-13)),bars=[];
  while(keyOf2(d)<=state.activeDate){const key=keyOf2(d),actual=unitsDoneOn2(key),target=fullDayTarget(key),h=Math.max(2,Math.min(100,actual/Math.max(target,1)*100));bars.push(`<div class="bar-col"><div class="bar ${actual>target?'over':''}" style="height:${h}%" title="${fmtDate(key)} · ${actual.toFixed(2)} / ${target.toFixed(2)} A"></div><div class="bar-label">${fmtDate(key)}</div></div>`);d.setDate(d.getDate()+1)}
  const lane=(track,cls)=>{const all=ITEMS.filter(i=>i.track===track),complete=all.filter(i=>getP(i.id)?.d0),u=complete.reduce((sum,i)=>sum+i.unit,0),total=all.reduce((sum,i)=>sum+i.unit,0);return `<div class="metric"><div class="label">${track} 레일</div><div class="value ${cls}">${percent(u,total)}%</div><div class="detail">${complete.length}/${all.length} 항목 · ${u.toFixed(2)}/${total.toFixed(2)} A</div><div class="progress"><div style="width:${percent(u,total)}%"></div></div></div>`};
  return `${titleStats()}<section class="panel"><div class="panel-head"><div><div class="panel-title">진도 대시보드</div><div class="panel-note">달성률은 미래 날짜를 분모에 넣지 않고 운영 날짜까지의 누적 목표를 기준으로 계산한다.</div></div><span class="chip stage">${fmtDate(state.activeDate)} 기준</span></div><div class="panel-body"><div class="progress-summary">${metric2('오늘 진도',s.today.done,s.today.target)}${metric2('주간 진도',s.week.done,s.week.target)}${metric2('월간 진도',s.month.done,s.month.target)}</div><div class="grid two"><section class="panel"><div class="panel-head"><div class="panel-title">최근 14일 신규 진도</div><span class="panel-note">막대 = 목표 대비 실제 D0</span></div><div class="panel-body"><div class="chart">${bars.join('')}</div><div class="legend">보라색 막대는 해당 날짜 목표를 초과한 날. 0A인 날도 계획상 목표는 누적 분모에 포함된다.</div></div></section><section class="panel"><div class="panel-head"><div class="panel-title">전체 학습 상태</div><span class="panel-note">진도와 복습을 분리해서 확인</span></div><div class="panel-body"><div class="lane-overview">${lane('1·2·5','accent')}${lane('3·4','violet')}${metric2('복습 통과',reviewDone,reviewAll,'오늘 도래 '+dueReviews(state.activeDate).length+'개')}${metric2('전범위 구조화',done,ITEMS.length,done+'/'+ITEMS.length+' 항목 D0 완료')}</div></div></section></div></div></section>`;
}
function renderItems(){
  const filters=state.filters||{track:'all',rank:'all',q:''};
  const filtered=ITEMS.filter(i=>(filters.track==='all'||i.track===filters.track)&&(filters.rank==='all'||i.rank===filters.rank)&&(`${i.id} ${i.name} ${i.subject} ${i.section} ${i.typeCode}`).toLowerCase().includes((filters.q||'').toLowerCase()));
  const rows=filtered.map(i=>{const p=getP(i.id),st=itemStatus(i);return `<div class="row"><div>${tag(i.rank)}</div><div><div class="row-name">${esc(i.id)} · ${esc(i.name)}</div><div class="row-sub">${esc(i.track)} · ${esc(i.subject)} · ${esc(i.section)} · ${esc(i.typeCode)} ${esc(i.typeName)}</div></div><div><div class="row-sub">난도 ${i.difficulty} · 실습 ${i.practice}</div><div class="row-sub">${i.unit} A</div></div><div><div class="status ${st.cls}">${st.label}</div><div class="row-sub">${p?.d0?'D0 '+fmtDate(p.d0):'아직 D0 없음'}</div></div><div class="row-actions">${p?.d0?`<button class="btn mini" data-action="open-note" data-id="${i.id}">메모</button><button class="btn danger mini" data-action="undo-d0" data-id="${i.id}">D0 취소</button>`:`<button class="btn primary mini" data-action="complete-d0" data-id="${i.id}">D0 완료</button><button class="btn mini" data-action="choose-d0" data-id="${i.id}">날짜 지정</button>`}</div></div>`}).join('');
  return `${titleStats()}<section class="panel"><div class="panel-head"><div><div class="panel-title">전체 157개 항목</div><div class="panel-note">D0 완료를 잘못 눌렀으면 언제든 <b>D0 취소</b>로 해당 항목의 진도와 연결된 복습 기록을 되돌릴 수 있다.</div></div><span class="panel-note">${filtered.length}개 표시</span></div><div class="panel-body"><div class="toolbar"><input id="searchItems" placeholder="번호, 항목명, 과목, 유형 검색" value="${esc(filters.q||'')}" /><select id="filterTrack"><option value="all">전체 레일</option><option value="1·2·5" ${filters.track==='1·2·5'?'selected':''}>1·2·5</option><option value="3·4" ${filters.track==='3·4'?'selected':''}>3·4</option></select><select id="filterRank"><option value="all">전체 랭크</option>${['A','B','C','D'].map(r=>`<option value="${r}" ${filters.rank===r?'selected':''}>${r}랭크</option>`).join('')}</select><div class="spacer"></div><button class="ghost mini" data-action="clear-filters">필터 초기화</button></div><div class="list">${rows||'<div class="empty">조건에 맞는 항목이 없어.</div>'}</div></div></section>`;
}
function renderSettings(){
  const s=state.settings;
  return `<section class="panel"><div class="panel-head"><div><div class="panel-title">운영 설정</div><div class="panel-note">기본은 평일 총 6A, 주말 총 12A. 목표를 바꿔도 이미 완료한 D0와 복습 일정은 흔들리지 않는다.</div></div></div><div class="panel-body"><div class="settings-grid"><div class="setting"><label>평일 1·2·5 신규 목표 (A환산)</label><input id="w125" type="number" step="0.25" min="0" value="${s.w125}"><div class="help">기본 3A</div></div><div class="setting"><label>평일 3·4 신규 목표 (A환산)</label><input id="w34" type="number" step="0.25" min="0" value="${s.w34}"><div class="help">기본 3A</div></div><div class="setting"><label>주말 1·2·5 신규 목표 (A환산)</label><input id="e125" type="number" step="0.25" min="0" value="${s.e125}"><div class="help">기본 6A</div></div><div class="setting"><label>주말 3·4 신규 목표 (A환산)</label><input id="e34" type="number" step="0.25" min="0" value="${s.e34}"><div class="help">기본 6A</div></div><div class="setting"><label>시험일</label><input id="examDate" type="date" value="${s.examDate}"><div class="help">기록용. 달성률 계산에는 영향을 주지 않음.</div></div></div><div class="card-actions" style="margin-top:16px"><button class="btn primary" data-action="save-settings">설정 저장</button><button class="btn danger" data-action="reset-all">전체 진행 기록 초기화</button></div><div class="notice" style="margin:16px 0 0">A: D+1·3·7·14·21 / B: D+1·7·21 / C: D+3·14 / D: D+7. <b>D0 취소</b>는 해당 항목의 D0와 연결된 복습 통과 기록만 지우며, 메모는 보존한다.</div></div></section>`;
}
function render(){
  document.getElementById('activeDate').value=state.activeDate;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.activeTab));
  const map={dashboard:renderDashboard,today:renderToday,backlog:renderBacklog,items:renderItems,settings:renderSettings};
  document.getElementById('main').innerHTML=(map[state.activeTab]||renderToday)();
  bindInputs();
}
function showToast2(text,undoFn){
  const root=document.getElementById('toastRoot');
  root.innerHTML=`<div class="toast"><span>${esc(text)}</span>${undoFn?'<button id="toastUndo">실행 취소</button>':''}</div>`;
  if(undoFn) document.getElementById('toastUndo').onclick=()=>{root.innerHTML='';undoFn()};
  setTimeout(()=>{if(root.innerHTML)root.innerHTML=''},6500);
}
function setD0(id,date){
  const before=state.progress[id]?JSON.parse(JSON.stringify(state.progress[id])):null;
  const p=ensureP(id);p.d0=date;p.reviews={};save('D0 자동 저장');render();
  showToast2(id+' D0 완료 처리됨',()=>{if(before)state.progress[id]=before;else delete state.progress[id];save('D0 실행 취소');render()});
}
function undoD0(id,ask=true){
  const item=ITEMS.find(i=>i.id===id),before=state.progress[id]?JSON.parse(JSON.stringify(state.progress[id])):null;
  if(!before)return;
  if(ask&&!confirm(item.name+'의 D0와 연결된 복습 통과 기록을 취소할까? 메모는 유지돼.'))return;
  delete state.progress[id];save('D0 취소 저장');render();
  showToast2(id+' D0 완료를 취소했어',()=>{state.progress[id]=before;save('D0 복원');render()});
}
document.addEventListener('click',e=>{const b=e.target.closest('[data-action="undo-d0"]');if(!b)return;undoD0(b.dataset.id)});

render();
</script>
</body>
</html>
