<style>
:root{--bg:#091220;--bg2:#0b1526;--panel:#111f36;--panel2:#162842;--line:rgba(212,230,255,.15);--text:#eef6ff;--muted:#9fb1cf;--soft:#c9d8ed;--cyan:#78dcff;--violet:#b7a6ff;--green:#82efb4;--yellow:#ffd27e;--red:#ff9ab7;--shadow:0 18px 55px rgba(0,0,0,.31);--r:16px}
*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{background:radial-gradient(circle at 8% 0%,rgba(120,220,255,.16),transparent 31rem),radial-gradient(circle at 92% 0%,rgba(183,166,255,.13),transparent 30rem),linear-gradient(180deg,#0b1528,#07101c 80%);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR","Segoe UI",sans-serif}
button,input,select,textarea{font:inherit}button{color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer;transition:.16s}button:hover{background:rgba(120,220,255,.1);border-color:rgba(120,220,255,.5)}button.primary{background:linear-gradient(135deg,var(--cyan),var(--violet));border:0;color:#071220;font-weight:850}button.danger{color:#ffb8cb;border-color:rgba(255,154,184,.35)}button.ghost{background:transparent}button.small{font-size:.78rem;padding:6px 8px}input,select,textarea{width:100%;color:var(--text);background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:10px;padding:9px 10px;outline:none}input:focus,select:focus,textarea:focus{border-color:rgba(120,220,255,.75);box-shadow:0 0 0 3px rgba(120,220,255,.1)}textarea{min-height:100px;resize:vertical}.hidden{display:none!important}
.app{min-height:100vh}.topbar{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line);background:rgba(7,14,27,.79);backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:10px;min-width:0}.mark{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#06111e;font-weight:950;box-shadow:0 8px 24px rgba(120,220,255,.22)}.brand h1{font-size:1rem;margin:0}.brand p{font-size:.71rem;color:var(--muted);margin:2px 0 0}.top-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:flex-end}.date-field{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:.76rem}.date-field input{width:auto;padding:7px 8px;font-size:.78rem}.save-chip{font-size:.72rem;color:#bff8d1;border:1px solid rgba(131,239,180,.3);background:rgba(131,239,180,.07);border-radius:999px;padding:6px 8px}
.nav{display:flex;gap:6px;overflow:auto;padding:11px 18px 0;max-width:1440px;margin:0 auto}.nav button{white-space:nowrap;border-radius:10px 10px 0 0;border-bottom-color:transparent;color:#c8d7ec}.nav button.active{background:rgba(120,220,255,.12);border-color:rgba(120,220,255,.31);color:var(--text)}.main{max-width:1440px;margin:0 auto;padding:16px 18px 34px}.notice{border:1px solid rgba(120,220,255,.2);background:rgba(120,220,255,.045);padding:11px 13px;border-radius:13px;color:#c9ddf6;font-size:.8rem;line-height:1.52;margin-bottom:15px}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.panel{border:1px solid var(--line);background:rgba(15,28,49,.78);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:15px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(120,220,255,.06),rgba(183,166,255,.04))}.panel-title{font-size:.98rem;font-weight:900}.panel-note{font-size:.76rem;line-height:1.48;color:var(--muted);margin-top:4px}.panel-body{padding:14px}.progress-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.metric{border:1px solid var(--line);background:rgba(255,255,255,.024);border-radius:12px;padding:11px;min-width:0}.metric .label{font-size:.7rem;color:var(--muted)}.metric .value{font-size:1.38rem;font-weight:950;margin:4px 0 2px}.metric .detail{font-size:.71rem;color:var(--muted);line-height:1.45}.accent{color:var(--cyan)}.violet{color:var(--violet)}.green{color:var(--green)}.yellow{color:var(--yellow)}.red{color:var(--red)}.progress{height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:9px}.progress>div{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--cyan),var(--violet))}.chip{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);padding:4px 7px;font-size:.68rem;color:#d8e6f8;line-height:1}.chip.rankA{border-color:rgba(255,209,123,.4);color:#ffebba}.chip.rankB{border-color:rgba(120,220,255,.4);color:#d9f7ff}.chip.rankC{border-color:rgba(183,166,255,.4);color:#eee7ff}.chip.rankD{border-color:rgba(159,177,207,.4);color:#d2ddec}.chip.stage{border-color:rgba(131,239,180,.36);color:#ccffe0}.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.toolbar input{min-width:190px;flex:1}.toolbar select{width:auto;min-width:125px}.spacer{flex:1}.list{display:grid;gap:8px}.item{border:1px solid var(--line);background:rgba(255,255,255,.022);border-radius:12px;padding:11px}.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:9px}.item-name{font-size:.89rem;font-weight:880;line-height:1.35}.item-sub{font-size:.73rem;color:var(--muted);line-height:1.48;margin-top:4px}.item-actions{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}.lane-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.lane{border:1px solid var(--line);background:rgba(255,255,255,.018);border-radius:13px;padding:11px}.lane-title{display:flex;justify-content:space-between;align-items:center;gap:7px;font-weight:900;font-size:.86rem;margin-bottom:7px}.lane-title small{color:var(--muted);font-weight:600}.review{border-left:3px solid var(--yellow)}.review.overdue{border-left-color:var(--red)}.empty{padding:34px 14px;color:var(--muted);text-align:center;border:1px dashed rgba(120,220,255,.23);border-radius:12px}.forecast{border-top:3px solid var(--green)}.forecast-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.bar-chart{display:grid;grid-template-columns:repeat(14,minmax(0,1fr));gap:7px;align-items:end;height:170px;padding:12px 3px 0}.bar-col{height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;min-width:0}.bar{width:100%;max-width:22px;min-height:3px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--cyan),#3a74d2)}.bar.over{background:linear-gradient(180deg,var(--violet),#6d5fda)}.bar-label{font-size:.57rem;color:var(--muted);white-space:nowrap}.settings{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.setting{border:1px solid var(--line);border-radius:12px;padding:11px;background:rgba(255,255,255,.02)}.setting label{display:block;font-size:.74rem;color:#d8e5f7;font-weight:800;margin-bottom:6px}.setting .help{font-size:.7rem;color:var(--muted);line-height:1.45;margin-top:6px}.atlas-shell{height:min(900px,calc(100vh - 165px));min-height:680px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#091220;box-shadow:var(--shadow)}.atlas-shell iframe{width:100%;height:100%;border:0;display:block}.study-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:13px}.crumb{font-size:.78rem;color:var(--muted);line-height:1.5}.crumb b{color:#dbecff}.study-layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:14px}.study-side{align-self:start;position:sticky;top:84px}.study-side .item{margin-bottom:10px}.study-side-list{max-height:480px;overflow:auto;display:grid;gap:6px}.study-side-list button{width:100%;text-align:left}.atlas-overview{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.modal-backdrop{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:16px;background:rgba(0,0,0,.62);backdrop-filter:blur(7px)}.modal{width:min(590px,100%);max-height:min(760px,92vh);display:grid;grid-template-rows:auto 1fr auto;background:#10203a;border:1px solid rgba(120,220,255,.34);border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6)}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:14px;border-bottom:1px solid var(--line)}.modal-head b{font-size:.92rem}.modal-body{overflow:auto;padding:14px;color:#c8d8ed;font-size:.84rem;line-height:1.55}.modal-body label{display:block;color:#d4e4f9;font-size:.74rem;font-weight:800;margin:0 0 6px}.modal-foot{display:flex;gap:8px;align-items:center;padding:11px;border-top:1px solid var(--line)}.grow{flex:1}.toast{position:fixed;right:17px;bottom:17px;z-index:90;display:flex;align-items:center;gap:9px;max-width:min(420px,calc(100vw - 34px));padding:10px 11px;border:1px solid rgba(120,220,255,.4);border-radius:12px;background:#15314e;box-shadow:var(--shadow);font-size:.79rem}.footer{max-width:1440px;margin:0 auto;padding:0 18px 20px;color:#7385a4;font-size:.72rem;line-height:1.5}
@media(max-width:1000px){.study-layout{grid-template-columns:1fr}.study-side{position:static}.study-side-list{max-height:210px}.forecast-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.atlas-shell{height:780px}}
@media(max-width:760px){.topbar{padding:10px 12px;align-items:flex-start}.brand p{display:none}.top-actions{gap:5px}.date-field span{display:none}.main{padding:13px 12px 28px}.nav{padding:9px 12px 0}.grid.two,.lane-grid{grid-template-columns:1fr}.progress-summary{grid-template-columns:1fr}.forecast-grid,.atlas-overview{grid-template-columns:1fr}.settings{grid-template-columns:1fr}.item-top{flex-direction:column}.item-actions{justify-content:flex-start}.atlas-shell{height:760px;min-height:600px}.top-actions button.small{display:none}.save-chip{display:none}}

<div class="app">
  <header class="topbar">
    <div class="brand"><div class="mark">I</div><div><h1>정처기 Learning OS</h1><p>진도·복습·Concept Atlas를 하나의 학습 흐름으로</p></div></div>
    <div class="top-actions">
      <label class="date-field"><span>운영 날짜</span><input id="activeDate" type="date"></label>

      <button class="small" data-action="export">통합 백업</button>
      <label class="small" style="cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:6px 8px">불러오기<input id="importFile" type="file" accept="application/json" class="hidden"></label>
    </div>
  </header>
  <nav class="nav" id="nav">
    <button data-tab="dashboard">대시보드</button>
    <button data-tab="today">오늘 실행</button>
    <button data-tab="backlog">새 진도 레일</button>
    <button data-tab="items">전체 항목</button>
    <button data-tab="atlas">Atlas</button>
    <button data-tab="settings">운영 설정</button>
  </nav>
  <main class="main" id="main"></main>
  <div class="footer">진도·복습·Atlas 개념 데이터는 이 브라우저와 이 GitHub Pages 도메인에 저장된다. 기기 이동이나 브라우저 초기화 전에는 통합 백업을 내보내는 편이 안전하다.</div>

function defaultState(){return {version:4,activeTab:'dashboard',previousTab:'today',activeDate:isoToday(),studyItemId:'',progress:{},notes:{},settings:{startDate:'2026-07-07',w125:3,w34:3,e125:6,e34:6,examDate:'2026-08-07'},itemFilters:{q:'',track:'all',rank:'all',subject:'all',section:'all'}}}

  return `<article class="item"><div class="item-top"><div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${rankChip(item.rank)}${itemStatus(item)}<span class="chip">${item.unit}A</span></div><div class="item-name">${esc(item.id)} · ${esc(item.name)}</div><div class="item-sub">${esc(item.subject)} · ${esc(item.section)} · ${esc(item.typeCode)} ${esc(item.typeName)} · 난도 ${item.difficulty} · 실습 ${item.practice}</div><div class="item-sub">권장 산출물: ${esc(item.recommendedAction||'—')}</div></div><div class="item-actions"><button class="small" data-action="open-study" data-id="${item.id}">학습하기</button>${p?.d0?`<button class="small danger" data-action="cancel-d0" data-id="${item.id}">D0 취소</button>`:`<button class="small primary" data-action="complete-d0" data-id="${item.id}">D0 완료</button><button class="small" data-action="pick-date" data-id="${item.id}">날짜 지정</button>`}${extra}</div></div></article>`;
}
function metric(label,done,goal,detail=''){
  const per=pct(done,goal);
  return `<div class="metric"><div class="label">${label}</div><div class="value ${per>=100?'green':'accent'}">${per}%</div><div class="detail">${roundA(done).toFixed(2)} / ${roundA(goal).toFixed(2)} A${detail?` · ${detail}`:''}</div><div class="progress"><div style="width:${Math.min(100,per)}%"></div></div></div>`;
}
function renderDashboard(){
  const today=todayStats(),week=weekStats(),four=fourWeekStats(),one=forecastTrack('1·2·5'),two=forecastTrack('3·4'),overall=one.finish>two.finish?one.finish:two.finish,actual=actualForecast(),coverage=atlasCoverage();
  let date=addDays(state.activeDate,-13),bars=[];
  while(date<=state.activeDate){const actualA=d0Units(date),goal=dailyGoal(date),height=Math.max(2,Math.min(100,actualA/Math.max(goal,1)*100));bars.push(`<div class="bar-col"><div class="bar ${actualA>goal?'over':''}" style="height:${height}%" title="${fmtDate(date)} · ${actualA.toFixed(2)} / ${goal.toFixed(2)}A"></div><div class="bar-label">${fmtDate(date)}</div></div>`);date=addDays(date,1)}
  return `<div class="notice"><b>운영 기준:</b> 평일 ${state.settings.w125+state.settings.w34}A · 주말 ${state.settings.e125+state.settings.e34}A. 주간 목표는 <b>${goalRange(mondayOf(state.activeDate),sundayOf(state.activeDate)).toFixed(0)}A</b>이고, 월간은 달력 월이 아니라 <b>4주 목표</b>로 계산한다. 시작일 이전 날짜는 목표에서 자동 제외된다.</div>
  <section class="panel forecast"><div class="panel-head"><div><div class="panel-title">1회독 완료 예측</div><div class="panel-note">계획 종료일은 실제 D0를 반영한 뒤 남은 구간을 현재 목표량으로 시뮬레이션한다. 실적 종료일은 첫 D0 이후 실제 평균 속도를 연장한 참고값이다.</div></div><span class="chip stage">${fmtDate(state.activeDate)} 기준</span></div><div class="panel-body"><div class="forecast-grid"><div class="metric"><div class="label">계획 페이스 전체 종료</div><div class="value green">${fmtDate(overall)}</div><div class="detail">1·2·5 / 3·4 중 늦는 레일 기준</div></div><div class="metric"><div class="label">1·2·5 레일</div><div class="value accent">${fmtDate(one.finish)}</div><div class="detail">잔여 ${one.items}개 · ${one.remaining.toFixed(2)}A</div></div><div class="metric"><div class="label">3·4 레일</div><div class="value violet">${fmtDate(two.finish)}</div><div class="detail">잔여 ${two.items}개 · ${two.remaining.toFixed(2)}A</div></div><div class="metric"><div class="label">실적 페이스 전체 종료</div><div class="value yellow">${actual?fmtDate(actual.finish):'—'}</div><div class="detail">${actual?`${actual.days}일 · 평균 ${actual.rate.toFixed(2)}A/일`:'D0를 1개 이상 완료하면 계산'}</div></div></div></div></section>
  <section class="panel"><div class="panel-head"><div><div class="panel-title">진도 대시보드</div><div class="panel-note">목표 달성률과 경과 페이스를 분리했다. 주간/4주 목표는 미래 날짜까지 포함한 전체 블록 목표, 경과 페이스는 오늘까지의 누적 목표다.</div></div></div><div class="panel-body"><div class="progress-summary">${metric('오늘 목표',today.done,today.goal)}${metric('주간 목표',week.done,week.goal,`${fmtDate(week.start)}~${fmtDate(week.end)}`)}${metric('4주 목표',four.done,four.goal,`${fmtDate(four.start)}~${fmtDate(four.end)}`)}</div><div class="progress-summary" style="margin-top:10px">${metric('주간 경과 페이스',week.done,week.paceGoal,'오늘까지 기대치')}${metric('4주 경과 페이스',four.done,four.paceGoal,'오늘까지 기대치')}<div class="metric"><div class="label">복습 통과</div><div class="value violet">${reviewDoneCount()}<span style="font-size:.8rem;color:var(--muted)"> / ${reviewTotalCount()}</span></div><div class="detail">기한 도래 미통과 ${dueReviews().length}개</div></div></div>
    <div class="grid two" style="margin-top:14px"><section class="panel"><div class="panel-head"><div class="panel-title">최근 14일 신규 진도</div><span class="panel-note">막대 = 일 목표 대비 D0</span></div><div class="panel-body"><div class="bar-chart">${bars.join('')}</div><div class="panel-note">보라색은 목표 초과. 완료하지 않은 미래 날짜는 달성률의 분모에는 들어가지만 막대에는 아직 나타나지 않는다.</div></div></section><section class="panel"><div class="panel-head"><div><div class="panel-title">Concept Atlas 연결 현황</div><div class="panel-note">시험 항목 ↔ 전역 개념의 다중 연결 상태</div></div><button class="small" data-action="open-atlas">Atlas 열기</button></div><div class="panel-body"><div class="atlas-overview"><div class="metric"><div class="label">연결된 학습 항목</div><div class="value accent">${coverage.items}<span style="font-size:.8rem;color:var(--muted)"> / 157</span></div><div class="detail">현재 항목에 필요한 개념을 바로 여는 기반</div></div><div class="metric"><div class="label">연결된 Atlas 개념</div><div class="value violet">${coverage.concepts}</div><div class="detail">한 개념은 여러 챕터에 중복 연결 가능</div></div><div class="metric"><div class="label">미연결 항목</div><div class="value yellow">${coverage.unlinked.length}</div><div class="detail">학습하기에서 기존 개념 연결 또는 생성</div></div></div></div></section></div></div></section>`;
}
function renderToday(){
  const today=todayStats(),week=weekStats(),four=fourWeekStats(),due=dueReviews(),done=ITEMS.filter(i=>pOf(i.id)?.d0===state.activeDate);
  const lane=(track,cls)=>{const target=trackTarget(track,state.activeDate),doneA=d0Units(state.activeDate,track),rem=Math.max(0,target-doneA);let used=0,next=[];for(const i of ITEMS.filter(x=>x.track===track&&!pOf(x.id)?.d0)){next.push(i);used+=Number(i.unit||0);if(used>=Math.max(rem,.25)-.001||next.length>=4)break}return `<section class="lane"><div class="lane-title"><span class="${cls}">${track} 레일</span><small>${doneA.toFixed(2)} / ${target.toFixed(2)}A</small></div><div class="progress"><div style="width:${Math.min(100,pct(doneA,target))}%"></div></div><div class="item-sub" style="margin:8px 0">남은 기준 ${rem.toFixed(2)}A · 내부 순서는 고정, D0 날짜만 실제 완료일로 기록.</div><div class="list">${next.length?next.map(i=>itemCard(i)).join(''):'<div class="empty">이 레일 신규 항목을 전부 완료했어.</div>'}</div></section>`};
  return `<section class="panel"><div class="panel-head"><div><div class="panel-title">오늘 실행</div><div class="panel-note">신규 진도는 D0, 복습은 기한이 도래한 항목을 통과 처리한다. 학습하기는 현재 과목·챕터·항목으로 자동 필터된 Atlas를 연다.</div></div><span class="chip stage">${fmtDate(state.activeDate)}</span></div><div class="panel-body"><div class="progress-summary">${metric('오늘 진도',today.done,today.goal)}${metric('주간 목표',week.done,week.goal,`페이스 ${pct(week.done,week.paceGoal)}%`)}${metric('4주 목표',four.done,four.goal,`페이스 ${pct(four.done,four.paceGoal)}%`)}</div><div class="lane-grid" style="margin-top:14px">${lane('1·2·5','accent')}${lane('3·4','violet')}</div></div></section>
  <div class="grid two" style="margin-top:14px"><section class="panel"><div class="panel-head"><div><div class="panel-title">오늘 처리할 복습</div><div class="panel-note">기한 도래 + 미처리 누적</div></div><span class="chip ${due.length?'':'stage'}">${due.length}개</span></div><div class="panel-body"><div class="list">${due.length?due.map(r=>`<article class="item review ${r.overdue?'overdue':''}"><div class="item-top"><div><div style="display:flex;gap:6px;align-items:center">${rankChip(r.item.rank)}<span class="chip">${r.stage}</span>${r.overdue?'<span class="chip" style="color:var(--red)">기한 경과</span>':''}</div><div class="item-name">${esc(r.item.id)} · ${esc(r.item.name)}</div><div class="item-sub">복습 기한 ${fmtDate(r.due)} · ${esc(r.item.typeCode)} · ${esc(r.item.recommendedAction||'')}</div></div><div class="item-actions"><button class="small" data-action="open-study" data-id="${r.item.id}">개념 보기</button><button class="small primary" data-action="pass-review" data-id="${r.item.id}" data-stage="${r.stage}">통과 처리</button></div></div></article>`).join(''):'<div class="empty">오늘 처리할 복습이 없어.</div>'}</div></div></section><section class="panel"><div class="panel-head"><div><div class="panel-title">오늘 D0 완료</div><div class="panel-note">잘못 찍었으면 취소하면 연결된 복습 통과 기록도 함께 제거된다. 메모는 보존한다.</div></div></div><div class="panel-body"><div class="list">${done.length?done.map(i=>itemCard(i)).join(''):'<div class="empty">아직 오늘 D0 완료 항목이 없어.</div>'}</div></div></section></div>`;
}
function renderBacklog(){
  const lane=(track,cls)=>{const all=ITEMS.filter(i=>i.track===track),done=all.filter(i=>pOf(i.id)?.d0),next=all.filter(i=>!pOf(i.id)?.d0).slice(0,18);return `<section class="panel"><div class="panel-head"><div><div class="panel-title ${cls}">${track} 새 진도 레일</div><div class="panel-note">${done.length}/${all.length}개 · ${done.reduce((s,i)=>s+i.unit,0).toFixed(2)}/${all.reduce((s,i)=>s+i.unit,0).toFixed(2)}A</div></div><span class="chip">${pct(done.length,all.length)}%</span></div><div class="panel-body"><div class="list">${next.length?next.map(i=>itemCard(i)).join(''):'<div class="empty">이 레일의 신규 항목을 전부 D0 처리했어.</div>'}</div></div></section>`};return `<div class="grid two">${lane('1·2·5','accent')}${lane('3·4','violet')}</div>`}
function renderItems(){
  const f=state.itemFilters,subjects=[...new Set(ITEMS.map(i=>i.subject))],sections=[...new Set(ITEMS.filter(i=>f.subject==='all'||i.subject===f.subject).map(i=>i.section))];

function renderStudy(){
  const item=itemById(state.studyItemId)||ITEMS[0],same=ITEMS.filter(i=>i.subject===item.subject&&i.section===item.section),p=pOf(item.id);
  setTimeout(()=>mountAtlas('studyAtlas', {mode:'study',scope:'item',subject:item.subject,section:item.section,itemId:item.id,groupBy:'none',relationRoot:'',relationMode:'all',tocOpen:true,editorOpen:false}),0);
  return `<div class="study-head"><div><button class="small" data-action="back-study">← 이전 화면</button><div class="crumb" style="margin-top:8px"><b>정보처리기사</b> / ${esc(item.subject)} / ${esc(item.section)} / <b>${esc(item.id)} ${esc(item.name)}</b></div><div class="panel-note">학습하기는 현재 항목을 기본값으로 잡을 뿐, Atlas 안에서 과목·챕터·항목·관계 필터와 연결 정보는 언제든 수정 가능하다.</div></div><div class="item-actions">${p?.d0?`<button class="danger" data-action="cancel-d0" data-id="${item.id}">D0 취소</button>`:`<button class="primary" data-action="complete-d0" data-id="${item.id}">D0 완료</button><button data-action="pick-date" data-id="${item.id}">날짜 지정</button>`}</div></div><div class="study-layout"><aside class="study-side"><section class="panel"><div class="panel-head"><div class="panel-title">현재 챕터</div><span class="chip">${same.length}개</span></div><div class="panel-body"><div class="study-side-list">${same.map(x=>`<button class="${x.id===item.id?'primary':''}" data-action="study-select-item" data-id="${x.id}">${esc(x.id)} · ${esc(x.name)}</button>`).join('')}</div></div></section><section class="panel" style="margin-top:12px"><div class="panel-head"><div class="panel-title">D0 완료 기준</div></div><div class="panel-body"><div class="item-sub">${rankChip(item.rank)} ${item.unit}A · ${esc(item.typeCode)} ${esc(item.typeName)}</div><div class="item-sub" style="margin-top:10px">권장 산출물: <b style="color:#dcecff">${esc(item.recommendedAction||'—')}</b></div><div class="item-sub" style="margin-top:10px">Atlas는 개념 구조·비교·절차·관계의 근거를 만들고, D0는 해당 랭크 기준 무노트 테스트·실습을 통과했을 때만 기록.</div><button class="small" style="margin-top:10px" data-action="open-note" data-id="${item.id}">오류/보완 메모</button></div></section></aside><section class="atlas-shell"><iframe id="studyAtlas" title="현재 학습 항목 Concept Atlas"></iframe></section></div>`;
}

function renderSettings(){

function render(){
  ensureBridge();
  $('#activeDate').value=state.activeDate;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.activeTab));
  let html='';
  if(state.activeTab==='dashboard')html=renderDashboard();
  else if(state.activeTab==='today')html=renderToday();
  else if(state.activeTab==='backlog')html=renderBacklog();
  else if(state.activeTab==='items')html=renderItems();
  else if(state.activeTab==='study')html=renderStudy();
  else if(state.activeTab==='atlas')html=renderAtlas();
  else html=renderSettings();
  $('#main').innerHTML=html;
}
function mountAtlas(id,context){
  const frame=document.getElementById(id);if(!frame)return;
  const bytes=Uint8Array.from(atob(ATLAS_B64),c=>c.charCodeAt(0));
  frame.srcdoc=new TextDecoder().decode(bytes);
  frame.addEventListener('load',()=>{try{frame.contentWindow.postMessage({type:'ipe-atlas-context',context},'*')}catch{}},{once:true});
}

function openModal(html){$('#modalRoot').innerHTML=`<div class="modal-backdrop">${html}</div>`}
function closeModal(){$('#modalRoot').innerHTML='';modalAction=null}
function openConfirm(title,body,ok,fn){modalAction=fn;openModal(`<div class="modal"><div class="modal-head"><b>${esc(title)}</b><button class="small" data-action="close-modal">닫기</button></div><div class="modal-body">${body}</div><div class="modal-foot"><span class="grow"></span><button data-action="close-modal">취소</button><button class="primary" data-action="confirm-modal">${esc(ok)}</button></div></div>`)}
function showToast(message,undo){clearTimeout(toastTimer);undoAction=undo||null;$('#toastRoot').innerHTML=`<div class="toast"><span>${esc(message)}</span>${undo?'<button class="small" data-action="toast-undo">실행 취소</button>':''}</div>`;toastTimer=setTimeout(()=>{$('#toastRoot').innerHTML='';undoAction=null},8500)}
function setD0(id,date){
  const before=clone(pOf(id)||null);const p=ensureP(id);p.d0=date;p.reviews={};save('D0 저장됨');render();
  showToast(`${itemById(id).name} · D0 ${fmtDate(date)} 기록`,()=>{if(before)state.progress[id]=before;else delete state.progress[id];save('D0 실행 취소');render()});
}
function cancelD0(id){
  const before=clone(pOf(id)||null);if(!before?.d0)return;
  openConfirm('D0 완료를 취소할까?',`<b>${esc(itemById(id).id)} · ${esc(itemById(id).name)}</b><br><br>D0와 이 항목에 연결된 복습 통과 기록이 삭제돼. 오류·보완 메모는 유지한다.`, 'D0 취소',()=>{delete state.progress[id];save('D0 취소됨');closeModal();render();showToast('D0와 복습 기록을 취소했어.',()=>{state.progress[id]=before;save('D0 복원');render()})});
}
function dateModal(id){const p=pOf(id);openModal(`<div class="modal"><div class="modal-head"><b>D0 날짜 지정 · ${esc(itemById(id).name)}</b><button class="small" data-action="close-modal">닫기</button></div><div class="modal-body"><label>실제로 구조화·초회 통과한 날짜</label><input id="modalDate" type="date" value="${esc(p?.d0||state.activeDate)}"></div><div class="modal-foot"><span class="grow"></span><button class="primary" data-action="save-date" data-id="${id}">D0 저장</button></div></div>`)}
function noteModal(id){openModal(`<div class="modal"><div class="modal-head"><b>${esc(itemById(id).id)} · ${esc(itemById(id).name)} — 오류/보완 메모</b><button class="small" data-action="close-modal">닫기</button></div><div class="modal-body"><div class="item-sub" style="margin-bottom:10px">${esc(itemById(id).typeCode)} · 권장 산출물 ${esc(itemById(id).recommendedAction||'—')}</div><label>오류 유형, 혼동쌍, 다음 재시험 때 확인할 포인트</label><textarea id="modalNote" placeholder="예: LEFT JOIN에서 WHERE 조건 위치를 반대로 기억함">${esc(state.notes[id]||'')}</textarea></div><div class="modal-foot"><span class="grow"></span><button class="primary" data-action="save-note" data-id="${id}">메모 저장</button></div></div>`)}
function exportData(){const payload={version:4,app:state,bridge:bridge()};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`정처기_LearningOS_백업_${state.activeDate}.json`;a.click();URL.revokeObjectURL(a.href);showToast('통합 백업을 내보냈어.')}
function importData(file){const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);if(data.app){state=mergeState(defaultState(),data.app);if(data.bridge)localStorage.setItem(BRIDGE_KEY,JSON.stringify(data.bridge));}else{state=mergeState(defaultState(),data)}save('백업 불러옴');render();showToast('백업을 불러왔어.')}catch{showToast('백업 형식을 읽지 못했어.')}};reader.readAsText(file)}
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-action],[data-tab]');if(!b)return;
  if(b.dataset.tab){state.previousTab=state.activeTab;state.activeTab=b.dataset.tab;save();render();return}
  const a=b.dataset.action,id=b.dataset.id;
  if(a==='complete-d0')setD0(id,state.activeDate);
  else if(a==='cancel-d0')cancelD0(id);
  else if(a==='pick-date')dateModal(id);
  else if(a==='save-date'){const d=$('#modalDate')?.value;if(d){closeModal();setD0(id,d)}}
  else if(a==='pass-review'){const p=ensureP(id);p.reviews[b.dataset.stage]=state.activeDate;save('복습 통과 저장');render();showToast(`${b.dataset.stage} 복습을 통과 처리했어.`)}
  else if(a==='open-note')noteModal(id);
  else if(a==='save-note'){state.notes[id]=$('#modalNote').value;save('메모 저장');closeModal();render();showToast('메모를 저장했어.')}
  else if(a==='close-modal')closeModal();
  else if(a==='confirm-modal'){const fn=modalAction;modalAction=null;fn?.()}
  else if(a==='toast-undo'){const fn=undoAction;$('#toastRoot').innerHTML='';undoAction=null;fn?.()}
  else if(a==='open-study'){state.previousTab=state.activeTab;state.studyItemId=id;state.activeTab='study';save();render()}
  else if(a==='study-select-item'){state.studyItemId=id;save();render()}
  else if(a==='back-study'){state.activeTab=state.previousTab||'today';save();render()}
  else if(a==='open-atlas'){state.activeTab='atlas';save();render()}
  else if(a==='clear-item-filters'){state.itemFilters={q:'',track:'all',rank:'all',subject:'all',section:'all'};save();render()}
  else if(a==='save-settings'){['w125','w34','e125','e34'].forEach(k=>state.settings[k]=Number($('#'+k).value)||0);state.settings.startDate=$('#startDate').value||state.settings.startDate;state.settings.examDate=$('#examDate').value||state.settings.examDate;save('운영 설정 저장');render();showToast('목표량과 시작일을 저장했어.')}
  else if(a==='reset-progress')openConfirm('진도·복습 기록을 초기화할까?','D0와 복습 통과 기록, 오류 메모가 삭제돼. Atlas 개념과 학습 연결 정보는 유지된다.','초기화',()=>{state.progress={};state.notes={};save('진도 초기화');closeModal();render();showToast('진도와 복습 기록을 초기화했어.')});
  else if(a==='export')exportData();
});
document.addEventListener('change',e=>{
  if(e.target.id==='activeDate'){state.activeDate=e.target.value;save();render()}
  if(e.target.id==='importFile'&&e.target.files[0]){importData(e.target.files[0]);e.target.value=''}
  const f=state.itemFilters;
  if(e.target.id==='filterTrack'){f.track=e.target.value;save();render()}
  if(e.target.id==='filterRank'){f.rank=e.target.value;save();render()}
  if(e.target.id==='filterSubject'){f.subject=e.target.value;f.section='all';save();render()}
  if(e.target.id==='filterSection'){f.section=e.target.value;save();render()}
});
let itemSearchTimer=null;
document.addEventListener('input',e=>{
  if(e.target.id==='itemSearch'){
    const value=e.target.value, caret=e.target.selectionStart;
    state.itemFilters.q=value;
    clearTimeout(itemSearchTimer);
    itemSearchTimer=setTimeout(()=>{
      save();
      render();
      const input=$('#itemSearch');
      if(input){input.focus();input.setSelectionRange(Math.min(caret,input.value.length),Math.min(caret,input.value.length))}
    },220);
  }
});
window.addEventListener('message',e=>{if(e.data?.type==='ipe-atlas-bridge-updated'){if(state.activeTab==='dashboard')render();}});
ensureBridge();render();
</script>
</body>
</html>
